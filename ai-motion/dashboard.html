<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dashboard · iterate</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);overflow:hidden;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;transition:background .8s ease}
  #stage{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}

  /* window */
  .win{width:712px;background:var(--win);border:1px solid var(--stroke);border-radius:18px;box-shadow:0 40px 100px rgba(20,22,40,.30);overflow:hidden;transition:background .7s ease,border-color .7s ease,box-shadow .7s ease}
  .chrome{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--stroke);transition:border-color .7s ease}
  .dots{display:flex;gap:7px}
  .dots i{width:11px;height:11px;border-radius:50%;background:var(--dot)}
  .dots i:nth-child(1){background:#ff5f57}.dots i:nth-child(2){background:#febc2e}.dots i:nth-child(3){background:#28c840}
  .prompt{flex:1;display:flex;align-items:center;gap:8px;background:var(--field);border:1px solid var(--stroke);border-radius:9px;padding:6px 11px;font-size:12.5px;color:var(--ink2);max-width:430px;margin:0 auto}
  .prompt .spark{width:13px;height:13px;flex:none;color:var(--accent)}
  .prompt .pcaret{display:inline-block;width:1.5px;height:13px;background:var(--accent);margin-left:1px;transform:translateY(2px);animation:bl 1s steps(1) infinite}
  @keyframes bl{0%,50%{opacity:1}51%,100%{opacity:0}}
  .ver{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--accent);background:var(--accentbg);padding:4px 9px;border-radius:7px;font-family:'JetBrains Mono',monospace}

  /* canvas */
  .canvas{position:relative;height:392px;margin:18px;border-radius:12px;background:
      radial-gradient(circle at 1px 1px, var(--grid) 1px, transparent 0) 0 0/22px 22px,
      var(--canvas);
    transition:background .7s ease}
  .blk{position:absolute;border-radius:13px;background:var(--card);border:1px solid var(--cardstroke);box-shadow:0 6px 20px rgba(20,22,40,.06);overflow:hidden;
    transition:left .85s cubic-bezier(.7,0,.2,1),top .85s cubic-bezier(.7,0,.2,1),width .85s cubic-bezier(.7,0,.2,1),height .85s cubic-bezier(.7,0,.2,1),opacity .5s ease,transform .5s ease,background .7s ease,border-color .7s ease;
    padding:14px}
  .blk.hide{opacity:0;transform:scale(.9)}
  .blk .lbl{font-size:11px;font-weight:600;color:var(--ink2);letter-spacing:.2px}
  .blk .big{font-size:30px;font-weight:800;letter-spacing:-1px;color:var(--ink);margin-top:6px;font-variant-numeric:tabular-nums}
  .blk .delta{font-size:11.5px;font-weight:600;color:#21b07a;margin-top:auto}
  .kpi{display:flex;flex-direction:column}
  .spark{position:absolute;right:12px;bottom:12px;width:64px;height:26px}

  /* bar chart */
  .chart-head{display:flex;align-items:center;justify-content:space-between}
  .chart-head .t{font-size:13px;font-weight:700;color:var(--ink)}
  .bars{position:absolute;left:14px;right:14px;bottom:14px;top:46px;display:flex;align-items:flex-end;gap:8px}
  .bars .bar{flex:1;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:6px 6px 3px 3px;height:8%;transition:height .9s cubic-bezier(.6,0,.2,1)}
  /* line chart */
  .lwrap{position:absolute;left:0;right:0;bottom:0;top:42px}
  .lwrap svg{width:100%;height:100%}
  .lpath{fill:none;stroke:var(--accent);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:600;stroke-dashoffset:600;transition:stroke-dashoffset 1.1s ease}
  .larea{fill:url(#lg);opacity:0;transition:opacity .8s ease}
  /* donut */
  .donut{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .donut svg{width:128px;height:128px;transform:rotate(-90deg)}
  .donut .ring{fill:none;stroke-width:16;stroke-linecap:round;transition:stroke-dasharray 1s ease}
  .donut .center{position:absolute;text-align:center}
  .donut .center b{font-size:24px;font-weight:800;color:var(--ink);letter-spacing:-.5px}
  .donut .center span{display:block;font-size:10.5px;color:var(--ink2);font-weight:600;margin-top:1px}
  /* list */
  .row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--cardstroke)}
  .row:last-child{border-bottom:none}
  .row .av{width:26px;height:26px;border-radius:8px;flex:none;background:var(--accentbg)}
  .row .nm{font-size:12.5px;font-weight:600;color:var(--ink)}
  .row .mt{font-size:11px;color:var(--ink2)}
  .row .vv{margin-left:auto;font-size:12.5px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}

  .cap{text-align:center;color:#fff;mix-blend-mode:difference;transition:opacity .35s}
  .cap.swap{opacity:0}
  .cap .n{font-size:15px;font-weight:600;letter-spacing:-.2px}
  .cap .s{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;opacity:.6;margin-top:4px}

  /* light/dark themes */
  body{--accent:#5b6cff;--accent2:#8ea0ff}
  body[data-theme="light"]{--bg:#eef0f6;--win:#ffffff;--stroke:rgba(20,22,40,.08);--field:#f4f5fa;--canvas:#f7f8fc;--grid:rgba(20,22,40,.07);--card:#ffffff;--cardstroke:rgba(20,22,40,.07);--ink:#15172a;--ink2:#73768c;--dot:#ccc;--accentbg:rgba(91,108,255,.12)}
  body[data-theme="dark"]{--bg:#0a0b12;--win:#14151d;--stroke:rgba(255,255,255,.08);--field:#1c1e28;--canvas:#101119;--grid:rgba(255,255,255,.05);--card:#1a1c26;--cardstroke:rgba(255,255,255,.07);--ink:#f3f4f8;--ink2:#9a9db0;--dot:#333;--accentbg:rgba(124,138,255,.16);--accent:#7c8aff;--accent2:#a6b2ff}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body data-theme="light">
  <div id="stage">
    <div class="win">
      <div class="chrome">
        <div class="dots"><i></i><i></i><i></i></div>
        <div class="prompt"><svg class="spark" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 6.3L21 11l-6.6 2.7L12 20l-2.4-6.3L3 11l6.6-2.7z"/></svg><span id="ptxt"></span><span class="pcaret" id="pcaret"></span></div>
        <div class="ver" id="ver">v1</div>
      </div>
      <div class="canvas" id="canvas">
        <div class="blk kpi" id="k1"><div class="lbl">Revenue</div><div class="big" data-c="128400" data-pre="$">$0</div><div class="delta">▲ 12.4%</div><svg class="spark" viewBox="0 0 64 26" id="sp1"></svg></div>
        <div class="blk kpi" id="k2"><div class="lbl">Active users</div><div class="big" data-c="8420">0</div><div class="delta">▲ 6.1%</div><svg class="spark" viewBox="0 0 64 26" id="sp2"></svg></div>
        <div class="blk kpi" id="k3"><div class="lbl">Conversion</div><div class="big" data-c="3.8" data-suf="%" data-dec="1">0%</div><div class="delta">▲ 0.4%</div><svg class="spark" viewBox="0 0 64 26" id="sp3"></svg></div>
        <div class="blk" id="bar"><div class="chart-head"><span class="t">Revenue by week</span><span class="lbl">last 9w</span></div><div class="bars" id="bars"></div></div>
        <div class="blk" id="line"><div class="chart-head"><span class="t">Growth trend</span><span class="lbl">YTD</span></div><div class="lwrap"><svg viewBox="0 0 240 120" preserveAspectRatio="none"><defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--accent)" stop-opacity=".28"/><stop offset="1" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs><path class="larea" id="larea"/><path class="lpath" id="lpath"/></svg></div></div>
        <div class="blk" id="donut"><div class="chart-head"><span class="t">Traffic breakdown</span></div><div class="donut"><svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="48" fill="none" stroke="var(--cardstroke)" stroke-width="16"/><circle class="ring" id="ring1" cx="60" cy="60" r="48" stroke="var(--accent)"/><circle class="ring" id="ring2" cx="60" cy="60" r="48" stroke="#21b07a"/><circle class="ring" id="ring3" cx="60" cy="60" r="48" stroke="#febc2e"/></svg><div class="center"><b>61%</b><span>Organic</span></div></div></div>
        <div class="blk" id="list"><div class="chart-head"><span class="t">Top sources</span></div><div id="rows" style="margin-top:6px"></div></div>
      </div>
    </div>
    <div class="cap"><div class="n">Dashboard builder</div><div class="s">v1 · clean grid</div></div>
  </div>

<script>
const $=id=>document.getElementById(id);
const wait=ms=>new Promise(r=>setTimeout(r,ms));
const gate=async()=>{while(window.__paused)await new Promise(r=>setTimeout(r,150))};

// ---- build sub-charts ----
function sparkline(svg, pts){
  const w=64,h=26,max=Math.max(...pts),min=Math.min(...pts);
  const d=pts.map((p,i)=>`${i?'L':'M'}${(i/(pts.length-1)*w).toFixed(1)} ${(h-2-((p-min)/(max-min||1))*(h-4)).toFixed(1)}`).join(' ');
  svg.innerHTML=`<path d="${d}" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity=".85"/>`;
}
sparkline($('sp1'),[4,6,5,8,7,10,9,12,14]);
sparkline($('sp2'),[8,7,9,8,11,10,12,11,13]);
sparkline($('sp3'),[2,3,2.5,3,3.4,3.2,3.6,3.5,3.8]);

const BARSET=[ [40,55,48,70,62,80,72,90,85], [55,48,72,60,88,76,95,82,100], [30,48,40,62,55,75,68,88,96] ];
function buildBars(){ const b=$('bars'); b.innerHTML=''; for(let i=0;i<9;i++){const d=document.createElement('div');d.className='bar';b.appendChild(d);} }
buildBars();
function setBars(set){ [...$('bars').children].forEach((bar,i)=>{ bar.style.height=(BARSET[set][i])+'%'; }); }

const LINES=[
 'M0 95 L34 88 L68 92 L102 70 L136 74 L170 50 L204 40 L240 22',
 'M0 100 L34 80 L68 84 L102 60 L136 64 L170 44 L204 30 L240 14',
];
function setLine(i){ const p=$('lpath'),a=$('larea'); p.setAttribute('d',LINES[i]); a.setAttribute('d',LINES[i]+' L240 120 L0 120 Z');
  p.style.strokeDashoffset='600'; a.style.opacity='0';
  requestAnimationFrame(()=>{ p.style.strokeDashoffset='0'; a.style.opacity='1'; }); }

const C=2*Math.PI*48;
function setDonut(a,b,c){ const r1=$('ring1'),r2=$('ring2'),r3=$('ring3');
  r1.style.strokeDasharray=`${C*a} ${C}`;
  r2.style.strokeDasharray=`${C*b} ${C}`; r2.style.strokeDashoffset=-C*a;
  r3.style.strokeDasharray=`${C*c} ${C}`; r3.style.strokeDashoffset=-C*(a+b); }

const ROWS=[['Organic search','42.1k','#5b6cff'],['Direct','28.4k','#21b07a'],['Referral','16.9k','#febc2e'],['Social','9.2k','#ff5f8a']];
$('rows').innerHTML=ROWS.map(r=>`<div class="row"><span class="av" style="background:${r[2]}22"></span><div><div class="nm">${r[0]}</div><div class="mt">visitors</div></div><span class="vv">${r[1]}</span></div>`).join('');

// number counters
function countUp(el){ const target=+el.dataset.c, pre=el.dataset.pre||'', suf=el.dataset.suf||'', dec=+(el.dataset.dec||0);
  const start=performance.now(), dur=1100;
  function tick(now){ const t=Math.min(1,(now-start)/dur), e=1-Math.pow(1-t,3), v=target*e;
    el.textContent=pre+(dec?v.toFixed(dec):Math.round(v).toLocaleString())+suf;
    if(t<1)requestAnimationFrame(tick);} requestAnimationFrame(tick); }

// ---- layouts (magic-move coords within 676x392 canvas, 18px pad already on canvas) ----
const G={ // helper positions
};
const LAYOUTS=[
 { theme:'light', ver:'v1', prompt:'Build an analytics dashboard', label:'v1 · clean grid', bars:0, line:0, donut:[.61,.24,.15],
   pos:{ k1:[14,14,210,96,1], k2:[238,14,210,96,1], k3:[462,14,210,96,1],
         bar:[14,124,420,254,1], list:[448,124,224,254,1],
         line:[180,140,300,200,0], donut:[200,120,260,240,0] } },
 { theme:'light', ver:'v2', prompt:'Make the chart the hero + add a trend line', label:'v2 · chart-first', bars:1, line:1, donut:[.61,.24,.15],
   pos:{ bar:[14,14,430,214,1], line:[458,14,214,214,1],
         k1:[14,242,210,136,1], k2:[238,242,210,136,1], k3:[462,242,210,136,1],
         list:[200,180,280,200,0], donut:[200,120,260,240,0] } },
 { theme:'dark', ver:'v3', prompt:'Switch to dark mode + add a breakdown donut', label:'v3 · dark + donut', bars:2, line:1, donut:[.52,.31,.17],
   pos:{ donut:[14,14,310,200,1], bar:[338,14,334,200,1],
         line:[14,228,430,150,1], list:[458,228,214,150,1],
         k1:[120,90,210,136,0], k2:[238,242,210,136,0], k3:[462,242,210,136,0] } },
];

let li=-1;
function applyLayout(i){
  const L=LAYOUTS[i];
  document.body.dataset.theme=L.theme;
  for(const id in L.pos){ const [x,y,w,h,show]=L.pos[id]; const el=$(id);
    el.style.left=x+'px'; el.style.top=y+'px'; el.style.width=w+'px'; el.style.height=h+'px';
    el.classList.toggle('hide',!show); }
  setBars(L.bars); setLine(L.line); setDonut(...L.donut);
  if(L.theme==='light' || i===0){ /* recount on every layout for life */ }
  document.querySelectorAll('.big').forEach(countUp);
  // caption
  const cap=document.querySelector('.cap'); cap.classList.add('swap');
  setTimeout(()=>{ cap.querySelector('.n').textContent='Dashboard builder'; cap.querySelector('.s').textContent=L.label; cap.classList.remove('swap'); },350);
  $('ver').textContent=L.ver;
}

async function typePrompt(text){
  const t=$('ptxt'), c=$('pcaret'); c.style.display='inline-block'; t.textContent='';
  for(let i=0;i<text.length;i++){ if(window.__paused)await gate(); t.textContent=text.slice(0,i+1); await wait(26); }
  await wait(500); c.style.display='none';
}

applyLayout(0);
async function loop(){
  let i=0;
  while(true){
    await gate();
    await typePrompt(LAYOUTS[i].prompt);
    applyLayout(i);
    await wait(3400);
    i=(i+1)%LAYOUTS.length;
  }
}
window.__setLayout=applyLayout;
if(document.fonts&&document.fonts.ready){document.fonts.ready.then(()=>setTimeout(loop,400));}else{setTimeout(loop,600);}
</script>
</body>
</html>
