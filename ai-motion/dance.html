<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dance App · style cycle</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #0b0c0e;
    overflow: hidden;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- Stage: full-bleed backdrop that morphs per style ---- */
  #stage {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--stage);
    transition: background .8s ease;
  }

  /* ---- Card: ONE centered card. Tokens swap → it restyles in place ---- */
  #card {
    position: relative; width: 332px;
    background: var(--card); color: var(--fg);
    border: var(--border); border-radius: var(--radius); box-shadow: var(--shadow);
    font-family: var(--font); overflow: hidden;
    transition:
      background .6s ease, color .6s ease, border-radius .6s ease,
      box-shadow .6s ease, border-color .6s ease, transform .45s ease, opacity .45s ease;
  }
  #card.morphing { opacity: 0; transform: scale(.93) translateY(8px); }
  #card[data-style="glass"], #card[data-style="chrome"], #card[data-style="mesh"] {
    backdrop-filter: blur(18px) saturate(1.3); -webkit-backdrop-filter: blur(18px) saturate(1.3);
  }

  .pad { padding: 17px; display: flex; flex-direction: column; gap: 13px; }

  .topbar { display: flex; align-items: center; gap: 8px; background: var(--accentbg); border-radius: 13px; padding: 6px 8px; transition: background .6s ease; }
  .iconbtn { width: 28px; height: 28px; border-radius: 9px; flex: none; background: var(--chip); color: var(--fg); display: flex; align-items: center; justify-content: center; transition: background .6s ease, color .6s ease; }
  .placeholder { flex: 1; font-size: 13.5px; color: var(--ph); letter-spacing: -.1px; }

  .pills { display: flex; align-items: center; gap: 8px; padding: 2px; font-size: 13px; color: var(--sub); flex-wrap: wrap; }
  .pills b { color: var(--fg); font-weight: 500; }
  .seed { width: 11px; height: 11px; border-radius: 50%; flex: none; background: linear-gradient(135deg,#ff9966 0%,#ff5e62 60%,#c33764 100%); box-shadow: 0 0 0 1px var(--chip); }
  .middot { width: 3px; height: 3px; border-radius: 50%; background: var(--sub); display: inline-block; }

  .activity { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--sub); }
  .activity b { color: var(--fg); font-weight: 500; }
  .dur { margin-left: auto; font-variant-numeric: tabular-nums; }
  .dotgrid { display: grid; grid-template-columns: repeat(3,3px); grid-template-rows: repeat(3,3px); gap: 2px; }
  .dotgrid i { width: 3px; height: 3px; border-radius: 50%; background: var(--fg); opacity: .85; }

  /* ---- Dancer thumbnail (a mini art-scene per style) ---- */
  .thumb { position: relative; height: 150px; border-radius: 14px; overflow: hidden; background: var(--thumb-bg); box-shadow: inset 0 0 0 1px var(--thumb-stroke); transition: background .6s ease, box-shadow .6s ease; }
  .scene { position: absolute; inset: 0; }
  .scene svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  .thumb .badge { position: absolute; left: 10px; bottom: 10px; display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; letter-spacing: .2px; color: var(--fg); background: var(--glassbadge); padding: 4px 9px; border-radius: 999px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); transition: background .6s ease, color .6s ease; z-index: 2; }
  .thumb .rec { width: 7px; height: 7px; border-radius: 50%; background: #ff3b5c; animation: blink 1.4s steps(1) infinite; }
  @keyframes blink { 0%,60%{opacity:1} 61%,100%{opacity:.25} }

  .msg { min-height: 44px; font-size: 15px; line-height: 1.45; color: var(--fg); letter-spacing: -.1px; }
  .caret { display: inline-block; width: 2px; height: 1em; background: var(--fg); margin-left: 1px; transform: translateY(3px); animation: blink2 1s steps(1) infinite; }
  @keyframes blink2 { 0%,50%{opacity:1} 51%,100%{opacity:0} }

  .bottom { display: flex; align-items: center; justify-content: space-between; padding-top: 2px; }
  .upload { display: inline-flex; align-items: center; gap: 6px; background: var(--btn-bg); color: var(--btn-fg); border: var(--btn-border, none); padding: 9px 15px; border-radius: var(--btn-radius); font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: -.1px; position: relative; overflow: hidden; box-shadow: var(--btn-shadow, none); font-family: inherit; transition: background .6s ease, color .6s ease, border-radius .6s ease, box-shadow .6s ease; }
  .upload .ok { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; gap: 6px; background: var(--btn-bg); color: var(--btn-fg); opacity: 0; transform: translateY(100%); }
  .upload.done .ok { opacity: 1; transform: translateY(0); transition: opacity .25s, transform .35s cubic-bezier(.2,.8,.2,1); }
  .model { display: inline-flex; align-items: center; gap: 6px; background: var(--model-bg); color: var(--model-fg); padding: 7px 11px; border-radius: var(--model-radius, 999px); font-size: 12.5px; font-weight: 600; transition: background .6s ease, color .6s ease; }

  #card[data-style="brutal"] .upload, #card[data-style="chrome"] .upload { text-transform: uppercase; letter-spacing: .6px; font-weight: 800; }
  #card[data-style="brutal"] .pills b, #card[data-style="chrome"] .pills b { text-transform: uppercase; letter-spacing: .4px; font-weight: 700; }
  #card[data-style="editorial"] .msg { font-family: 'Inter', sans-serif; border-top: 1px solid var(--rule); padding-top: 11px; }
  #card[data-style="editorial"] .upload { letter-spacing: 2px; text-transform: uppercase; font-size: 11.5px; font-family: 'JetBrains Mono', monospace; }
  #card[data-style="editorial"] .dur, #card[data-style="cyber"] .dur { font-family: 'JetBrains Mono', monospace; }
  #card[data-style="chrome"]::before { content: ""; position: absolute; top: 0; left: 16px; right: 16px; height: 2px; border-radius: 2px; background: linear-gradient(135deg,#e7e9f3,#b6bbd1 25%,#fff 50%,#9aa0ba 75%,#e7e9f3); }

  #cap { margin-top: 26px; text-align: center; color: #fff; mix-blend-mode: difference; font-family: 'Inter', system-ui, sans-serif; transition: opacity .35s ease; opacity: 1; }
  #cap.swap { opacity: 0; }
  #cap .name { font-size: 15px; font-weight: 600; letter-spacing: -.2px; }
  #cap .mode { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; opacity: .65; margin-top: 4px; }

  #dots { position: fixed; bottom: 26px; left: 0; right: 0; display: flex; gap: 7px; justify-content: center; }
  #dots i { width: 6px; height: 6px; border-radius: 50%; background: #fff; opacity: .25; transition: opacity .3s, transform .3s; mix-blend-mode: difference; }
  #dots i.on { opacity: .95; transform: scale(1.5); }

  /* =========================================================================
     Per-dancer animations. Each scene SVG is injected per style.
     transform-box:fill-box keeps origins local to each element's bbox.
  ========================================================================= */
  @keyframes bob   { 50% { transform: translateY(-6px); } }
  @keyframes sway  { 0%,100% { transform: rotate(-3deg);} 50% { transform: rotate(3deg);} }
  @keyframes twinkle { 0%,100% { opacity:.3; transform: scale(.7);} 50% { opacity:1; transform: scale(1.15);} }
  @keyframes spin  { to { transform: rotate(360deg);} }

  /* 1 · fine-line tattoo */
  .fl-fig { transform-box: fill-box; transform-origin: 50% 95%; animation: sway 2.6s ease-in-out infinite; }
  .fl-star { transform-box: fill-box; transform-origin: 50% 50%; animation: twinkle 2.2s ease-in-out infinite; }
  .fl-fig path { stroke-dasharray: 220; stroke-dashoffset: 0; animation: fldraw 6s ease-in-out infinite; }
  @keyframes fldraw { 0%,100%{ stroke-dashoffset: 6;} 50%{ stroke-dashoffset: -6;} }

  /* 2 · anime b/w */
  .an-fig  { transform-box: fill-box; transform-origin: 50% 100%; animation: anbob 1s ease-in-out infinite; }
  @keyframes anbob { 0%,100%{ transform: translateY(0) rotate(-2deg);} 50%{ transform: translateY(-5px) rotate(2deg);} }
  .an-speed { animation: anspeed 0.5s linear infinite; }
  @keyframes anspeed { from{ transform: translateX(0);} to{ transform: translateX(-26px);} }
  .an-burst { transform-box: fill-box; transform-origin: 50% 100%; animation: twinkle 0.9s ease-in-out infinite; }

  /* 3 · Haring */
  .ha-fig  { transform-box: fill-box; transform-origin: 50% 100%; animation: habounce 0.7s ease-in-out infinite; }
  @keyframes habounce { 0%,100%{ transform: translateY(0) scaleY(1);} 50%{ transform: translateY(-7px) scaleY(1.04);} }
  .ha-rays { transform-box: fill-box; transform-origin: 50% 50%; animation: twinkle 0.7s ease-in-out infinite; }

  /* 4 · Basquiat */
  .bq-fig  { transform-box: fill-box; transform-origin: 50% 60%; animation: jitter .28s steps(2) infinite; }
  @keyframes jitter { 0%{transform:translate(0,0) rotate(0)} 25%{transform:translate(1px,-1px) rotate(.6deg)} 50%{transform:translate(-1px,1px) rotate(-.6deg)} 75%{transform:translate(1px,1px) rotate(.3deg)} 100%{transform:translate(0,0)} }
  .bq-crown { transform-box: fill-box; transform-origin: 50% 100%; animation: twinkle 1.1s ease-in-out infinite; }

  /* 5 · Warhol */
  .wh-p1 { animation: whflash 2.4s steps(1) infinite; }
  .wh-p2 { animation: whflash 2.4s steps(1) infinite .6s; }
  .wh-p3 { animation: whflash 2.4s steps(1) infinite 1.2s; }
  .wh-p4 { animation: whflash 2.4s steps(1) infinite 1.8s; }
  @keyframes whflash { 0%,100%{ opacity:1;} 50%{ opacity:.55;} }
  .wh-fig { transform-box: fill-box; transform-origin: 50% 100%; animation: sway 1.4s ease-in-out infinite; }

  /* 6 · Chrome Y2K */
  .ch-fig  { transform-box: fill-box; transform-origin: 50% 100%; animation: sway 2s ease-in-out infinite; }
  .ch-spark { transform-box: fill-box; transform-origin: 50% 50%; animation: twinkle 1.6s ease-in-out infinite; }
  .ch-spark.s2 { animation-delay: .5s; } .ch-spark.s3 { animation-delay: 1s; }
  .ch-sheen { animation: chsheen 2.4s linear infinite; }
  @keyframes chsheen { from{ transform: translateX(-140px);} to{ transform: translateX(160px);} }

  /* 7 · engraving ballet */
  .ed-fig { transform-box: fill-box; transform-origin: 50% 100%; animation: edsway 4s ease-in-out infinite; }
  @keyframes edsway { 0%,100%{ transform: rotate(-1.5deg);} 50%{ transform: rotate(1.5deg);} }

  /* 8 · Matrix */
  .mx-col { animation: mxrain linear infinite; }
  @keyframes mxrain { from{ transform: translateY(-160px);} to{ transform: translateY(160px);} }
  .mx-fig { animation: mxglitch 2.5s steps(1) infinite; filter: drop-shadow(0 0 4px #00ff95); }
  @keyframes mxglitch { 0%,90%,100%{ transform: translateX(0);} 92%{ transform: translateX(-2px);} 94%{ transform: translateX(2px);} 96%{ transform: translateX(-1px);} }

  /* 9 · Matisse cut-out */
  .ma-fig { transform-box: fill-box; transform-origin: 50% 90%; animation: mawob 2.2s ease-in-out infinite; }
  @keyframes mawob { 0%,100%{ transform: rotate(-3deg);} 50%{ transform: rotate(4deg);} }
  .ma-leaf { transform-box: fill-box; transform-origin: 50% 100%; animation: mawob 3s ease-in-out infinite reverse; }
  .ma-star { transform-box: fill-box; transform-origin: 50% 50%; animation: spin 9s linear infinite; }

  @media (prefers-reduced-motion: reduce) {
    .scene *, .scene { animation: none !important; }
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="card" data-style="original" data-mode="light">
      <div class="pad">
        <div class="thumb">
          <div class="scene" id="scene"></div>
          <div class="badge"><span class="rec"></span><span id="badgetxt">Rehearsal clips · 12 takes</span></div>
        </div>
        <div class="topbar">
          <div class="iconbtn"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M8.5 3.5L5 7l3.5 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="placeholder">Add some moves…</div>
          <div class="iconbtn"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 10.5V3.5M3.5 7L7 3.5l3.5 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        </div>

        <div class="pills">
          <b>Dance</b><span class="middot"></span>
          <span class="seed"></span>
          <b>Butoh</b><span class="middot"></span>
          <b>boldly ⌄</b>
        </div>

        <div class="activity">
          <span class="dotgrid"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span>
          <b>Intro</b>
          <span class="dur">32s</span>
        </div>

        <div class="msg"><span id="typed"></span><span class="caret" id="caret"></span></div>

        <div class="bottom">
          <button class="upload" id="upload">
            <span class="lbl">Go dance
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="margin-top:1px"><path d="M2.5 6h7M6.5 3l3 3-3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <span class="ok">
              <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2.5 7.5L6 11l5.5-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              On stage
            </span>
          </button>
          <div class="model">Opus 4.8 ⌄</div>
        </div>
      </div>
    </div>

  </div>
  <div id="dots"></div>

<script>
const MESSAGE = 'Slow Butoh rise — hollow the chest, fingers unfurl, weight sinking into the floor.';

/* ============================== THEMES (no purple) ============================== */
const THEMES = {

  bento: { label: 'Bento OS', font: "'Inter', system-ui, sans-serif", dance: 'B/W anime · street',

    dark:  { stage:"radial-gradient(60% 60% at 20% 20%,#ff7eb6 0%,transparent 60%),radial-gradient(60% 60% at 80% 30%,#5ec8ff 0%,transparent 65%),radial-gradient(70% 70% at 50% 90%,#6cf2c8 0%,transparent 65%),linear-gradient(135deg,#0c2540,#0a3a52)", card:"linear-gradient(160deg,rgba(18,42,70,.55),rgba(8,24,40,.7))", fg:"#eafaff", sub:"rgba(234,250,255,.55)", ph:"rgba(234,250,255,.45)", accentbg:"rgba(255,255,255,.07)", chip:"rgba(255,255,255,.1)", border:"1px solid rgba(255,255,255,.14)", radius:"28px", shadow:"0 30px 70px rgba(5,18,30,.6)", btnBg:"linear-gradient(135deg,#ff7eb6,#5ec8ff)", btnFg:"#fff", btnRadius:"999px", modelBg:"rgba(255,255,255,.08)", modelFg:"#eafaff", thumb:"rgba(255,255,255,.06)", thumbStroke:"rgba(255,255,255,.12)", ink:"#eafaff", badge:"rgba(0,0,0,.35)" } },

  brutal: { label: 'Neo-brutalism', font: "'Space Grotesk', system-ui, sans-serif", dance: 'Basquiat · raw',

    dark:  { stage:"#1a1a1a", card:"#111", fg:"#fff8e7", sub:"#cfc7b3", ph:"#9a937f", accentbg:"#1c1c1c", chip:"#1c1c1c", border:"4px solid #fff8e7", radius:"0px", shadow:"10px 10px 0 #fff8e7", btnBg:"#ff5c39", btnFg:"#111", btnRadius:"0px", btnBorder:"3px solid #fff8e7", btnShadow:"4px 4px 0 #fff8e7", modelBg:"#1c1c1c", modelFg:"#fff8e7", modelRadius:"0px", thumb:"#1c1c1c", thumbStroke:"#fff8e7", ink:"#fff8e7", badge:"rgba(0,0,0,.5)" } },

  mesh: { label: 'Mesh Maximalism', font: "'Inter', system-ui, sans-serif", dance: 'Andy Warhol · twist',

function applyTokens(styleKey, mode) {
  const t = THEMES[styleKey][mode];
  const map = {
    '--stage': t.stage, '--card': t.card, '--fg': t.fg, '--sub': t.sub, '--ph': t.ph,
    '--accentbg': t.accentbg, '--chip': t.chip, '--border': t.border, '--radius': t.radius,
    '--shadow': t.shadow, '--btn-bg': t.btnBg, '--btn-fg': t.btnFg, '--btn-radius': t.btnRadius,
    '--btn-border': t.btnBorder || 'none', '--btn-shadow': t.btnShadow || 'none',
    '--model-bg': t.modelBg, '--model-fg': t.modelFg, '--model-radius': t.modelRadius || '999px',
    '--thumb-bg': t.thumb, '--thumb-stroke': t.thumbStroke, '--ink': t.ink,
    '--glassbadge': t.badge, '--rule': t.rule || 'transparent', '--font': THEMES[styleKey].font,
  };
  for (const k in map) { stage.style.setProperty(k, map[k]); card.style.setProperty(k, map[k]); }
  card.dataset.style = styleKey;
  card.dataset.mode = mode;
  if (scene.dataset.style !== styleKey) {   // only re-inject when the style actually changes
    scene.innerHTML = DANCERS[styleKey];
    scene.dataset.style = styleKey;
  }
}

const wait = ms => new Promise(r => setTimeout(r, ms));
const gate = async () => { while (window.__paused) await new Promise(r => setTimeout(r, 150)); };

function setCaption() { /* captions removed */ }

async function typewriter() {
  await gate();
  caret.style.display = 'inline-block';
  typed.textContent = '';
  const start = performance.now();
  const SPEED = 26;
  return new Promise(resolve => {
    function tick(now) {
      const n = Math.min(MESSAGE.length, Math.floor((now - start) / SPEED));
      typed.textContent = MESSAGE.slice(0, n);
      if (n < MESSAGE.length) requestAnimationFrame(tick);
      else { caret.style.display = 'none'; resolve(); }
    }
    requestAnimationFrame(tick);
  });
}

async function doUpload() {
  await gate();
  uploadBtn.animate(
    [{ transform:'translateX(0)' },{ transform:'translateX(-5px)' },{ transform:'translateX(5px)' },
     { transform:'translateX(-3px)' },{ transform:'translateX(3px)' },{ transform:'translateX(0)' }],
    { duration: 360, easing: 'ease-in-out' });
  await wait(420);
  uploadBtn.animate([{ transform:'scale(1)' },{ transform:'scale(.93)' },{ transform:'scale(1)' }], { duration: 180, easing: 'ease-out' });
  await wait(120);
  uploadBtn.classList.add('done');
  await wait(1500);
  uploadBtn.classList.remove('done');
}

async function morphStyle(styleKey, mode) {
  await gate();
  card.classList.add('morphing');
  await wait(420);
  applyTokens(styleKey, mode);
  setCaption(styleKey, mode);
  await wait(40);
  card.classList.remove('morphing');
  await wait(480);
}

// initial paint
applyTokens('original','light');
window.__setTheme = (s, m) => applyTokens(s, m || 'light');   // inert debug hook

async function loop() {
  while (true) {
    for (let s = 0; s < ORDER.length; s++) {
      await gate();
      const styleKey = ORDER[s];
      dots.forEach((d,i) => d.classList.toggle('on', i === s));

      await typewriter();
      await wait(500);
      await doUpload();
      await wait(500);

      await gate();
      applyTokens(styleKey, 'dark');
      setCaption(styleKey, 'dark');
      await wait(2600);
      await gate();

      const next = ORDER[(s + 1) % ORDER.length];
      await morphStyle(next, 'light');
    }
  }
}

if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(() => setTimeout(loop, 400));
} else { setTimeout(loop, 600); }
</script>
