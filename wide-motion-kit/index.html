<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>wide-motion-kit · pattern book</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{display:flex;height:100vh;font-family:'Inter',-apple-system,sans-serif;background:#f2f2f3;color:#151515;overflow:hidden}
#side{width:280px;flex-shrink:0;overflow-y:auto;border-right:1px solid rgba(0,0,0,.08);background:#fff;padding:18px 12px}
#side h1{font-size:15px;padding:4px 10px 12px}
#side h2{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#8a8a8a;padding:14px 10px 6px}
#side button{display:flex;gap:8px;width:100%;text-align:left;border:none;background:none;font:13px/1.3 inherit;
  padding:7px 10px;border-radius:8px;cursor:pointer;color:#333}
#side button:hover{background:#f0f0f0}
#side button.on{background:#151515;color:#fff}
#side .id{font-weight:700;width:26px;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column}
#bar{display:flex;align-items:center;gap:12px;padding:14px 22px;border-bottom:1px solid rgba(0,0,0,.08);background:#fff}
#bar b{font-size:14px}
#bar span{font-size:12.5px;color:#777}
#bar .re{margin-left:auto;border:1px solid rgba(0,0,0,.15);background:#fff;border-radius:999px;padding:7px 16px;font:12.5px inherit;cursor:pointer}
#frame{flex:1;border:none;width:100%}
</style>
</head>
<body>
<nav id="side"><h1>wide-motion-kit</h1></nav>
<div id="main">
  <div id="bar"><b id="t"></b><span id="n"></span><button class="re" onclick="replay()">↻ Replay</button></div>
  <iframe id="frame"></iframe>
</div>
<script>
/* ── embedded runtime (mirror of base.html) ── */
const CSS = `
:root{--stage:#ebebeb;--surface:#fff;--surface2:#f6f6f7;--ink:#151515;--sub:#767676;
--line:rgba(0,0,0,.09);--accent:#4734F7;--accent-soft:#ECE8FF;--acc-text:#fff;
--green:#15A34A;--green-soft:#E7F6EC;--red:#DC2626;--red-soft:#FBE9E9;
--radius:16px;--radius-sm:10px;--font:'Inter',-apple-system,sans-serif;--mono:ui-monospace,'SF Mono',monospace}
body.dark{--stage:#0d0d11;--surface:#17171b;--surface2:#1f1f24;--ink:#f2f2f0;--sub:#9a9a95;
--line:rgba(255,255,255,.10);--accent-soft:#26224d}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{background:var(--stage);font-family:var(--font);color:var(--ink);-webkit-font-smoothing:antialiased;
overflow:hidden;transition:background .7s cubic-bezier(.65,0,.35,1)}
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.camera{display:flex;align-items:center;justify-content:center;width:100%;height:100%;
transition:transform 1.1s cubic-bezier(.65,0,.35,1)}
.scene{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;
transform:scale(.985) translateY(10px);transition:opacity .55s cubic-bezier(.22,1,.36,1),transform .55s cubic-bezier(.22,1,.36,1)}
.scene.on{opacity:1;transform:none}
[data-in]{opacity:0;transition:opacity .7s cubic-bezier(.22,1,.36,1),transform .7s cubic-bezier(.22,1,.36,1),
filter .7s cubic-bezier(.22,1,.36,1),clip-path .7s cubic-bezier(.22,1,.36,1)}
[data-in=rise]{transform:translateY(24px)}[data-in=drop]{transform:translateY(-24px)}
[data-in=left]{transform:translateX(-32px)}[data-in=right]{transform:translateX(32px)}
[data-in=pop]{transform:scale(.55);transition-timing-function:cubic-bezier(.34,1.56,.64,1)}
[data-in=blur]{filter:blur(10px);transform:scale(1.03)}[data-in=wipe]{clip-path:inset(0 100% 0 0)}
[data-in=instant]{transition-duration:0s}
.in[data-in]{opacity:1;transform:none;filter:none;clip-path:inset(0 0 0 0)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius)}
.chip{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);
border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--ink)}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:var(--acc-text);
border-radius:var(--radius-sm);padding:10px 18px;font-size:13.5px;font-weight:600;border:none}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
#cursor{position:fixed;left:0;top:0;z-index:99;pointer-events:none;opacity:0;
transition:transform .8s cubic-bezier(.65,0,.35,1),opacity .3s}
#cursor.on{opacity:1}#cursor.press svg{transform:scale(.82)}#cursor svg{transition:transform .12s;display:block}
#cursor .ring{position:absolute;left:-7px;top:-7px;width:30px;height:30px;border-radius:50%;
border:2px solid var(--accent);opacity:0;transform:scale(.4)}
#cursor.clicked .ring{animation:ring .45s ease-out}
@keyframes ring{0%{opacity:.8;transform:scale(.4)}100%{opacity:0;transform:scale(1.5)}}
@keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin .8s linear infinite}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
.caret{display:inline-block;width:2px;height:1em;background:var(--accent);vertical-align:-2px;margin-left:1px;
animation:blink 1s steps(1,end) infinite}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.float{animation:floaty 5s ease-in-out infinite}
@keyframes eqb{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}
.eq{display:inline-flex;align-items:center;gap:2.5px;height:22px}
.eq i{width:2px;height:100%;background:var(--ink);border-radius:1px;transform-origin:center;animation:eqb 1s ease-in-out infinite}
.eq i:nth-child(2n){opacity:.35;animation-delay:.15s}.eq i:nth-child(3n){animation-delay:.3s}
@keyframes marx{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.marquee-x{display:flex;width:max-content;animation:marx var(--dur,40s) linear infinite}`;

const JS = `
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const T=[];const at=(ms,fn)=>T.push(setTimeout(fn,ms));
const show=sel=>{const el=typeof sel==='string'?$(sel):sel;el&&el.classList.add('in')};
const stagger=(ms,gap,els,fn)=>els.forEach((el,i)=>at(ms+i*gap,()=>fn?fn(el,i):el.classList.add('in')));
function typewriter(el,text,spd=38){el.textContent='';const c=document.createElement('span');
c.className='caret';el.after(c);const t0=performance.now();
(function tick(){const n=Math.min(text.length,Math.floor((performance.now()-t0)/spd));
el.textContent=text.slice(0,n);if(n<text.length)requestAnimationFrame(tick);else setTimeout(()=>c.remove(),600)})()}
function count(el,to,dur=900,fmt=v=>Math.round(v).toLocaleString()){const t0=performance.now();
(function tick(){const p=Math.min(1,(performance.now()-t0)/dur),e=1-Math.pow(1-p,3);
el.textContent=fmt(to*e);if(p<1)requestAnimationFrame(tick)})()}
function drawSVG(path,dur=800,delay=0){const L=path.getTotalLength();
path.style.strokeDasharray=L;path.style.strokeDashoffset=L;path.style.opacity=1;
at(delay,()=>{path.style.transition='stroke-dashoffset '+dur+'ms cubic-bezier(.65,0,.35,1)';
path.style.strokeDashoffset=0})}
function camera(scale=1,x=0,y=0,dur=1100){const c=$('#cam');c.style.transitionDuration=dur+'ms';
c.style.transform='translate('+x+'px,'+y+'px) scale('+scale+')'}
function cursorTo(x,y,ms=800){const c=$('#cursor');c.classList.add('on');
c.style.transitionDuration=ms+'ms';c.style.transform='translate('+x+'px,'+y+'px)'}
function cursorClick(){const c=$('#cursor');c.classList.add('press');
setTimeout(()=>{c.classList.remove('press');c.classList.add('clicked');
setTimeout(()=>c.classList.remove('clicked'),500)},130)}
function cut(idx,ms){at(ms,()=>{$$('.scene').forEach((s,i)=>s.classList.toggle('on',i===idx))})}
const loop=()=>{};
window.SCENE={at,show,stagger,typewriter,count,drawSVG,camera,cursorTo,cursorClick,cut,loop,$,$$};`;

const CURSOR = `<div id="cursor"><span class="ring"></span><svg width="17" height="20" viewBox="0 0 17 20"><path d="M1 1l6.2 17 2.3-7 7-2.6L1 1z" fill="#151515" stroke="#fff" stroke-width="1.4" stroke-linejoin="round"/></svg></div>`;

/* shared demo fragments */
const BARS = `<div id="bars" style="display:flex;align-items:flex-end;gap:9px;height:150px;width:330px">`+
  [42,66,95,70,84,58].map(h=>`<i style="flex:1;height:`+h+`%;background:var(--accent);opacity:`+(h===95?1:.82)+`;border-radius:var(--radius-sm);transform-origin:bottom;transform:scaleY(0);transition:transform .8s cubic-bezier(.22,1,.36,1)"></i>`).join('')+`</div>`;
const GROW = `SCENE.stagger(300,90,SCENE.$$('#bars i'),function(el){el.style.transform='scaleY(1)'});`;
const MINIROWS = n=>Array.from({length:n},(_,i)=>`<div class="rw" data-in="rise" style="display:flex;gap:10px;align-items:center;height:36px"><span class="dot" style="background:var(--accent-soft)"></span><span style="flex:1;height:9px;border-radius:5px;background:var(--line)"></span><span style="width:46px;height:9px;border-radius:5px;background:var(--line)"></span></div>`).join('');
const SCREEN = t=>`<div class="card" style="width:290px;height:190px;padding:14px;flex-shrink:0"><div style="font-size:12.5px;font-weight:600;margin-bottom:10px">`+t+`</div>`+MINIROWS(3).replaceAll('data-in="rise"','')+`</div>`;

const P = [
/* ─── INTERACTIONS ─── */
{id:'I1',cat:'Interactions',t:'Bar chart grows in',dur:3500,
 m:`<div class="card" style="padding:22px" data-in="rise"><div style="font-weight:600;font-size:14px;margin-bottom:14px">Revenue trend</div>`+BARS+`</div>`,
 c:`SCENE.show('[data-in]');`+GROW},
{id:'I2',cat:'Interactions',t:'Line draws + area fades',dur:3500,
 m:`<div class="card" style="padding:22px"><svg width="420" height="170" viewBox="0 0 420 170"><path id="ar" d="M0 130 C70 96 120 122 175 78 S 300 46 420 66 L420 170 L0 170 Z" fill="var(--accent)" opacity="0" style="transition:opacity .8s"/><path id="ln" d="M0 130 C70 96 120 122 175 78 S 300 46 420 66" fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" opacity="0"/></svg></div>`,
 c:`SCENE.drawSVG(SCENE.$('#ln'),1200,300);SCENE.at(1300,function(){SCENE.$('#ar').style.opacity=.14});`},
{id:'I3',cat:'Interactions',t:'Donut sweep + counter',dur:3500,
 m:`<div class="card" style="padding:26px;display:flex;align-items:center;gap:20px"><svg width="104" height="104" viewBox="0 0 110 110" style="transform:rotate(-90deg)"><circle cx="55" cy="55" r="46" fill="none" stroke="var(--line)" stroke-width="12"/><circle id="don" cx="55" cy="55" r="46" fill="none" stroke="var(--accent)" stroke-width="12" stroke-linecap="round" opacity="0" stroke-dasharray="289" stroke-dashoffset="289"/></svg><div><div style="font-size:32px;font-weight:700"><span id="pct">0</span>%</div><div style="font-size:12.5px;color:var(--sub)">Goal completion</div></div></div>`,
 c:`SCENE.at(300,function(){var d=SCENE.$('#don');d.style.opacity=1;d.style.transition='stroke-dashoffset 1.1s cubic-bezier(.22,1,.36,1)';d.style.strokeDashoffset=289*(1-.72)});SCENE.at(300,function(){SCENE.count(SCENE.$('#pct'),72,1100)});`},
{id:'I4',cat:'Interactions',t:'KPI counters tick up',dur:3200,
 m:`<div style="display:flex;gap:16px">`+[['Revenue','$','k',48.2],['Users','','',3914],['Conv.','','%',6.8]].map((s,i)=>`<div class="card" data-in="rise" style="padding:18px 22px;min-width:150px"><div style="font-size:11.5px;color:var(--sub)">`+s[0]+`</div><div style="font-size:26px;font-weight:700;margin-top:4px">`+s[1]+`<span class="k" data-to="`+s[3]+`">0</span>`+s[2]+`</div></div>`).join('')+`</div>`,
 c:`SCENE.stagger(200,150,SCENE.$$('.card'));SCENE.$$('.k').forEach(function(el,i){SCENE.at(400+i*150,function(){var to=+el.dataset.to;SCENE.count(el,to,900,to<10?function(v){return v.toFixed(1)}:to<100?function(v){return v.toFixed(1)}:undefined)})});`},
{id:'I5',cat:'Interactions',t:'Table rows cascade',dur:3200,
 m:`<div class="card" style="padding:18px;width:430px" data-in="rise">`+MINIROWS(5)+`</div>`,
 c:`SCENE.show('.card');SCENE.stagger(350,85,SCENE.$$('.rw'));`},
{id:'I6',cat:'Interactions',t:'Toggle flips (+ dark theme)',dur:3800,

 c:`SCENE.at(1100,function(){var t=SCENE.$('#tgl');t.style.background='var(--green)';t.firstElementChild.style.transform='translateX(20px)';document.body.classList.add('dark')});`},
{id:'I7',cat:'Interactions',t:'Form fills + submit',dur:5200,
 m:`<div class="card" style="padding:22px;width:340px;display:flex;flex-direction:column;gap:12px"><div style="font-size:11.5px;color:var(--sub)">Email</div><div class="card" style="padding:10px 13px;border-radius:var(--radius-sm)"><span id="f1" style="font-size:13.5px"></span></div><div style="font-size:11.5px;color:var(--sub)">Company</div><div class="card" style="padding:10px 13px;border-radius:var(--radius-sm)"><span id="f2" style="font-size:13.5px"></span></div><button class="btn" id="sb" style="align-self:flex-end;transition:background .3s">Submit</button></div>`,
 c:`SCENE.at(300,function(){SCENE.typewriter(SCENE.$('#f1'),'kacha@wideset.co',30)});SCENE.at(1400,function(){SCENE.typewriter(SCENE.$('#f2'),'Widelab',34)});SCENE.at(2600,function(){SCENE.cursorTo(innerWidth/2+110,innerHeight/2+92,700)});SCENE.at(3400,function(){SCENE.cursorClick();var b=SCENE.$('#sb');b.style.background='var(--green)';b.textContent='✓ Sent'});`},
{id:'I8',cat:'Interactions',t:'Typewriter search + results',dur:4200,
 m:`<div style="display:flex;flex-direction:column;gap:10px"><div class="card" style="width:380px;padding:12px 16px;display:flex;gap:10px;align-items:center"><span style="color:var(--sub)">⌕</span><span id="q" style="font-size:14.5px"></span></div>`+[1,2,3].map(()=>`<div class="card res" data-in="rise" style="padding:12px 16px;display:flex;gap:10px;align-items:center"><span class="dot"></span><span style="flex:1;height:9px;border-radius:5px;background:var(--line)"></span></div>`).join('')+`</div>`,
 c:`SCENE.at(300,function(){SCENE.typewriter(SCENE.$('#q'),'design tokens',46)});SCENE.stagger(1500,100,SCENE.$$('.res'));`},
{id:'I9',cat:'Interactions',t:'Toast slides in/out',dur:4000,
 m:`<div class="card" style="padding:40px 60px;color:var(--sub);font-size:13px">app content…</div><div class="card" id="to" data-in="right" style="position:fixed;right:26px;bottom:26px;padding:13px 18px;display:flex;gap:10px;align-items:center"><span class="dot" style="background:var(--green)"></span><span style="font-size:13px;font-weight:600">Saved to workspace</span></div>`,
 c:`SCENE.at(500,function(){SCENE.show('#to')});SCENE.at(2800,function(){SCENE.$('#to').classList.remove('in')});`},
{id:'I10',cat:'Interactions',t:'Modal opens',dur:4000,
 m:`<div class="card" style="padding:40px 80px;color:var(--sub);font-size:13px">page…</div><div id="sc" style="position:fixed;inset:0;background:rgba(0,0,0,.35);opacity:0;transition:opacity .4s"></div><div class="card" id="mo" data-in="pop" style="position:fixed;left:50%;top:50%;margin:-90px 0 0 -150px;width:300px;padding:22px"><div style="font-weight:700;font-size:15px">Invite your team</div><div style="font-size:12.5px;color:var(--sub);margin:8px 0 16px">Share this project with teammates.</div><button class="btn">Send invites</button></div>`,
 c:`SCENE.at(600,function(){SCENE.$('#sc').style.opacity=1;SCENE.show('#mo')});SCENE.at(3200,function(){SCENE.$('#sc').style.opacity=0;SCENE.$('#mo').classList.remove('in')});`},
{id:'I11',cat:'Interactions',t:'Tabs — underline slides',dur:4200,
 m:`<div class="card" style="padding:18px 22px 14px"><div style="display:flex;gap:22px;position:relative;padding-bottom:10px">`+['Overview','Analytics','Settings'].map((t,i)=>`<span class="tb" style="font-size:13.5px;font-weight:600;color:`+(i?'var(--sub)':'var(--ink)')+`;transition:color .3s">`+t+`</span>`).join('')+`<i id="u" style="position:absolute;bottom:0;left:0;width:64px;height:2px;background:var(--accent);transition:all .45s cubic-bezier(.22,1,.36,1)"></i></div></div>`,
 c:`var pos=[[0,64],[86,62],[170,58]];var tabs=SCENE.$$('.tb');[1,2,0].forEach(function(k,step){SCENE.at(1000+step*1000,function(){var u=SCENE.$('#u');u.style.left=pos[k][0]+'px';u.style.width=pos[k][1]+'px';tabs.forEach(function(t,i){t.style.color=i===k?'var(--ink)':'var(--sub)'})})});`},
{id:'I12',cat:'Interactions',t:'Dropdown opens + pick',dur:4200,
 m:`<div style="display:flex;flex-direction:column;gap:8px;align-items:flex-start"><span class="chip" id="tr">Status: <b id="v">Open</b> ▾</span><div class="card" id="dd" data-in="drop" style="padding:6px;width:170px;transform-origin:top">`+['In review','Approved','Shipped'].map(o=>`<div class="op" style="padding:9px 11px;border-radius:8px;font-size:13px">`+o+`</div>`).join('')+`</div></div>`,
 c:`SCENE.at(700,function(){SCENE.show('#dd')});SCENE.at(1500,function(){SCENE.cursorTo(innerWidth/2-20,innerHeight/2+46,600)});SCENE.at(2200,function(){SCENE.cursorClick();SCENE.$$('.op')[1].style.background='var(--accent-soft)'});SCENE.at(2600,function(){SCENE.$('#dd').classList.remove('in');SCENE.$('#v').textContent='Approved'});`},
{id:'I13',cat:'Interactions',t:'Skeleton → content',dur:4200,
 m:`<div class="card" style="padding:20px;width:380px;position:relative"><div id="sk">`+MINIROWS(3).replaceAll('data-in="rise"','')+`</div><div id="ct" data-in="blur" style="position:absolute;inset:20px"><div style="font-weight:700;font-size:15px">Q3 Report ready</div><div style="font-size:12.5px;color:var(--sub);margin-top:6px">Revenue up 12% — 3,914 active users this quarter.</div><span class="chip" style="margin-top:12px"><span class="dot" style="background:var(--green)"></span>On track</span></div></div>`,
 c:`SCENE.at(1400,function(){SCENE.$('#sk').style.opacity=0;SCENE.$('#sk').style.transition='opacity .4s';SCENE.show('#ct')});`},
{id:'I14',cat:'Interactions',t:'Badge pops + counts',dur:3000,
 m:`<div class="card" style="padding:22px 28px;position:relative"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M6 9a6 6 0 1 1 12 0c0 5 2 6 2 6H4s2-1 2-6" stroke="var(--ink)" stroke-width="1.8" stroke-linejoin="round"/><path d="M10 19a2 2 0 0 0 4 0" stroke="var(--ink)" stroke-width="1.8"/></svg><span id="bg" data-in="pop" style="position:absolute;top:12px;right:14px;background:var(--red);color:#fff;font-size:10.5px;font-weight:700;border-radius:999px;min-width:20px;height:20px;display:flex;align-items:center;justify-content:center;padding:0 5px">0</span></div>`,
 c:`SCENE.at(500,function(){SCENE.show('#bg');SCENE.count(SCENE.$('#bg'),12,700)});`},
{id:'I15',cat:'Interactions',t:'Kanban card drags over',dur:4200,
 m:`<div style="display:flex;gap:18px;position:relative">`+['To do','Done'].map(t=>`<div class="card" style="width:210px;padding:14px;background:var(--surface2)"><div style="font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.06em;margin-bottom:10px">`+t.toUpperCase()+`</div><div style="height:110px" class="col"></div></div>`).join('')+`<div class="card" id="kc" style="position:absolute;left:14px;top:44px;width:182px;padding:12px;transition:all .9s cubic-bezier(.22,1,.36,1)"><div style="font-size:12.5px;font-weight:600">Ship the promo</div><div style="font-size:11px;color:var(--sub);margin-top:3px">Due Friday</div></div></div>`,
 c:`SCENE.at(900,function(){var k=SCENE.$('#kc');k.style.transform='rotate(3deg)';k.style.left='242px'});SCENE.at(1900,function(){SCENE.$('#kc').style.transform='rotate(0)'});`},
{id:'I16',cat:'Interactions',t:'Button press → state',dur:4200,
 m:`<button class="btn" id="b" style="transition:all .3s;font-size:14px;padding:12px 22px">Deploy</button>`,
 c:`SCENE.at(600,function(){SCENE.cursorTo(innerWidth/2+26,innerHeight/2+12,700)});SCENE.at(1400,function(){SCENE.cursorClick();SCENE.$('#b').innerHTML='<span class="spin" style="width:13px;height:13px;border-radius:50%;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;display:inline-block"></span> Deploying…'});SCENE.at(2800,function(){var b=SCENE.$('#b');b.style.background='var(--green)';b.textContent='✓ Live'});`},

/* ── viewer plumbing ── */
const side = document.getElementById('side');
let cur = 0, timer = null;
const groups = {};
P.forEach((p,i)=>{ (groups[p.cat] = groups[p.cat] || []).push([p,i]) });
for (const [cat, items] of Object.entries(groups)) {
  const h = document.createElement('h2'); h.textContent = cat; side.appendChild(h);
  for (const [p,i] of items) {
    const b = document.createElement('button');
    b.innerHTML = '<span class="id">'+p.id+'</span>'+p.t;
    b.onclick = () => load(i);
    b.id = 'btn'+i;
    side.appendChild(b);
  }
}
function srcdoc(p){
  return '<!doctype html><html><head><meta charset="utf-8"><style>'+CSS+'</style></head><body>'
    +'<div id="stage"><div class="camera" id="cam">'+p.m+'</div></div>'+CURSOR
    +'<scr'+'ipt>'+JS+p.c+'</scr'+'ipt></body></html>';
}
function load(i){
  cur = i;
  const p = P[i];
  document.querySelectorAll('#side button').forEach((b,k)=>b.classList.toggle('on', b.id==='btn'+i));
  document.getElementById('t').textContent = p.id+' · '+p.t;
  document.getElementById('n').textContent = p.cat+' · loops every '+(p.dur/1000)+'s';
  replay();
}
function replay(){
  clearTimeout(timer);
  const p = P[cur];
  document.getElementById('frame').srcdoc = srcdoc(p);
  timer = setTimeout(replay, p.dur + 600);
}
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowDown'||e.key==='ArrowRight') load(Math.min(P.length-1,cur+1));
  if(e.key==='ArrowUp'||e.key==='ArrowLeft') load(Math.max(0,cur-1));
});
load(0);
</script>
