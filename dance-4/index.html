<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dance App · pixel calibration</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #0b0c0e;
    overflow: hidden;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- Pixel display: full-viewport micro grid that calibrates from noise ---- */
  #px { position: fixed; top: 0; left: 0; z-index: 0; }
  /* 1px separation lines carve the canvas into tiny discrete pixel cells */
  #pxgrid {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background-image:
      repeating-linear-gradient(0deg,  rgba(7,8,10,.62) 0 1px, transparent 1px 5px),
      repeating-linear-gradient(90deg, rgba(7,8,10,.62) 0 1px, transparent 1px 5px);
  }

  /* ---- Flood wave canvas: finale layer above everything ---- */
  #flood { position: fixed; inset: 0; z-index: 50; pointer-events: none; }

  /* ---- Stage: translucent per-style tint over the pixel display ---- */
  #stage {
    position: fixed; inset: 0; z-index: 2;
    display: flex; align-items: center; justify-content: center;
    background: var(--stage);
    perspective: 1400px;
    opacity: 0;                       /* revealed once the display has calibrated */
    transition: opacity .65s ease;
  }
  /* backdrop crossfade: outgoing tint rides on top and fades out */
  .bgfade { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
  #stage > #card { position: relative; z-index: 1; }

  /* ---- Card: ONE centered card. innerHTML + tokens swap per scene ---- */
  #card {
    position: relative; width: var(--w, 336px);
    background: var(--card); color: var(--fg);
    border: var(--border); border-radius: var(--radius); box-shadow: var(--shadow);
    font-family: var(--font); overflow: hidden;
    transform-style: preserve-3d;
    transition:
      background .4s ease, color .4s ease, border-radius .55s ease,
      box-shadow .55s ease, border-color .55s ease, transform .45s ease,
      opacity .45s ease, filter .55s ease;
  }
  #card.morphing { opacity: 0; transform: scale(.94) translateY(10px); }
  /* pre-calibration state: the card "emerges from the display" — soft, small, unfocused */
  #card.boot {
    opacity: 0; transform: scale(.955) translateY(10px); filter: blur(5px);
    transition-duration: .6s;
  }
  /* PYK shots: every state swap lands instantly — no transitions, no animation */
  #card.snap, #card.snap * { transition: none !important; animation: none !important; }
  #card[data-style="glass"] { backdrop-filter: blur(20px) saturate(1.25); -webkit-backdrop-filter: blur(20px) saturate(1.25); }

  .pad { padding: 18px; display: flex; flex-direction: column; gap: 14px; }
  .pad.glass { padding: 26px; gap: 18px; }
  .pad.bento { padding: 16px; gap: 12px; }
  .pad.voice { padding: 40px 30px 30px; gap: 0; align-items: center; }

  /* ---- shared bits ---- */
  .pills { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--sub); flex-wrap: wrap; }
  .pills b { color: var(--fg); font-weight: 500; }
  .glass .pills { font-size: 14.5px; gap: 9px; }
  .seed { width: 13px; height: 13px; border-radius: 50%; flex: none; background: linear-gradient(135deg,#ff9966 0%,#ff5e62 60%,#c33764 100%); box-shadow: 0 0 0 1px var(--chip); }
  .middot { width: 3px; height: 3px; border-radius: 50%; background: var(--sub); display: inline-block; }

  /* 3D glass ball — white/grey glossy sphere (glass scene) */
  .ball3d {
    width: 15px; height: 15px; border-radius: 50%; flex: none;
    background: radial-gradient(circle at 33% 27%, #ffffff 0%, #eceef1 26%, #b6bbc2 62%, #7c828b 88%, #565b63 100%);
    box-shadow:
      inset 0 1px 1.5px rgba(255,255,255,.95),
      inset 0 -2px 3px rgba(0,0,0,.35),
      0 2px 4px rgba(0,0,0,.4);
  }

  .activity { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--sub); }
  .glass .activity { font-size: 14px; }
  .activity b { color: var(--fg); font-weight: 500; }
  .dur { margin-left: auto; font-variant-numeric: tabular-nums; }
  .dotgrid { display: grid; grid-template-columns: repeat(3,3px); grid-template-rows: repeat(3,3px); gap: 2px; }
  .dotgrid i { width: 3px; height: 3px; border-radius: 50%; background: var(--fg); opacity: .85; }

  .msg { min-height: 46px; font-size: 15px; line-height: 1.45; color: var(--fg); letter-spacing: -.1px; }
  .glass .msg { font-size: 16px; min-height: 66px; }
  .caret { display: inline-block; width: 2px; height: 1em; background: var(--fg); margin-left: 1px; transform: translateY(3px); animation: blink 1s steps(1) infinite; }
  @keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }

  /* rehearsal-clips row (bento + glass) */
  .clips { display: flex; align-items: center; gap: 11px; background: var(--chip); border-radius: 14px; padding: 11px 13px; }
  .clips .folder { width: 34px; height: 34px; flex: none; border-radius: 10px; background: var(--accentbg); color: var(--fg); display: flex; align-items: center; justify-content: center; }
  .clips .ct b { font-size: 13.5px; font-weight: 600; color: var(--fg); }
  .clips .ct .sub2 { font-size: 12px; color: var(--sub); margin-top: 1px; }

  .bottom { display: flex; align-items: center; justify-content: space-between; padding-top: 2px; }
  .upload { display: inline-flex; align-items: center; justify-content: center; gap: 6px; background: var(--btn-bg); color: var(--btn-fg); border: var(--btn-border, none); padding: 10px 16px; border-radius: var(--btn-radius); font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: -.1px; position: relative; overflow: hidden; box-shadow: var(--btn-shadow, none); font-family: inherit; transition: background .5s ease, color .5s ease, border-radius .5s ease, box-shadow .5s ease, width .38s cubic-bezier(.65,0,.35,1); }
  .glass .upload { padding: 12px 20px; font-size: 14px; }
  .upload .lbl { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; transition: opacity .15s ease; }
  .upload.done .lbl { opacity: 0; }
  .upload .ok { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; gap: 6px; background: var(--btn-bg); color: var(--btn-fg); opacity: 0; transform: translateY(100%); }
  .upload.done .ok { opacity: 1; transform: translateY(0); transition: opacity .25s, transform .35s cubic-bezier(.2,.8,.2,1); }
  .model { display: inline-flex; align-items: center; gap: 6px; background: var(--model-bg); color: var(--model-fg); padding: 8px 12px; border-radius: 999px; font-size: 12.5px; font-weight: 600; transition: background .5s ease, color .5s ease; }
  .glass .model { padding: 10px 14px; font-size: 13px; }

  /* real-glass button: translucent fill + blur; colors come from theme vars */
  .glass .upload { backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
  .glass .model { border: 1px solid var(--accentbg); }

  /* ================= BENTO grid ================= */
  .tiles { display: grid; grid-template-columns: 1fr .78fr; gap: 12px; }
  .tile { background: var(--chip); border-radius: 18px; padding: 13px 14px; }
  .tile .tl-k { font-size: 10.5px; font-weight: 700; letter-spacing: .12em; color: var(--sub); text-transform: uppercase; }
  .tile .tl-v { font-size: 15px; margin-top: 6px; color: var(--fg); display: flex; align-items: center; gap: 7px; }
  .tile .tl-v b { font-weight: 600; }
  .tile .tl-v.big { font-size: 22px; font-weight: 700; letter-spacing: -.02em; }
  .tile.intro { padding: 13px 15px; }
  .tile.intro .msg { margin-top: 8px; min-height: 46px; }

  /* ================= VOICE (mono, 3D, single mode) ================= */
  .mic-wrap { position: relative; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; margin-bottom: 26px; }
  .mic-wrap .ring { position: absolute; inset: 0; border-radius: 50%; border: 1.5px solid rgba(255,255,255,.5); opacity: 0; }
  .mic-wrap.live .ring { animation: pulse 2.6s cubic-bezier(.4,0,.2,1) infinite; }
  .mic-wrap.live .ring.r2 { animation-delay: .87s; }
  .mic-wrap.live .ring.r3 { animation-delay: 1.74s; }
  @keyframes pulse { 0%{ transform: scale(.62); opacity:.55;} 70%{ opacity:0;} 100%{ transform: scale(1.25); opacity:0;} }
  .mic3d {
    width: 136px; height: 136px; border-radius: 50%;
    background: url('assets/mic.png') center/94% no-repeat, radial-gradient(circle at 40% 30%, #e7c8ea, #cfaed6 70%);
    box-shadow: 0 26px 55px rgba(0,0,0,.6), 0 2px 3px rgba(0,0,0,.5);
    transform: scale(0);
  }
  .mic3d.in { transform: scale(1); transition: transform .5s cubic-bezier(.34,1.56,.64,1); }
  /* silver mic animation — no circle: feathered edges blend into the silver stage */
  .micv {
    position: absolute; left: 50%; top: 50%; width: 250px; height: 250px;
    transform: translate(-50%, -50%);
    object-fit: cover; opacity: 0; transition: opacity .9s ease; z-index: 2;
    -webkit-mask-image: radial-gradient(circle closest-side, #000 58%, transparent 96%);
    mask-image: radial-gradient(circle closest-side, #000 58%, transparent 96%);
  }
  .micv.show { opacity: 1; }
  .mic-wrap.swap .mic3d { opacity: 0; transition: opacity .9s ease; }
  .voice-label { font-size: 12px; font-weight: 600; letter-spacing: .22em; text-transform: uppercase; color: rgba(255,255,255,.5); margin-bottom: 20px; transition: color .5s; }
  .prompt {
    width: 100%; min-height: 68px; display: flex; align-items: center; gap: 12px;
    background: linear-gradient(160deg, rgba(38,40,45,.9), rgba(20,21,25,.95));
    border: 1px solid rgba(255,255,255,.14);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.10), 0 16px 40px rgba(0,0,0,.55);
    border-radius: 18px; padding: 8px 8px 8px 18px;
    transition: background .5s ease, border-color .5s ease, box-shadow .5s ease;
  }
  .prompt .ptext { flex: 1; font-size: 16px; line-height: 1.45; color: #f4f4f5; letter-spacing: -.1px; transition: color .5s; }
  .prompt .caret { background: #fff; }
  .prompt .send {
    flex: none; align-self: stretch; aspect-ratio: 1 / 1; min-width: 52px; border-radius: 12px;
    background: linear-gradient(155deg, #3b3d43 0%, #1b1c1f 52%, #050506 100%);
    color: #fff; display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.18), inset 0 -2px 4px rgba(0,0,0,.55), 0 3px 10px rgba(0,0,0,.35);
    opacity: .45; transition: opacity .3s, transform .2s;
  }
  .prompt .send.ready { opacity: 1; }
  /* silver (light) voice mode — matches the mic animation's backdrop */
  #card[data-mode="light"] .voice-label { color: rgba(23,24,27,.45); }
  #card[data-mode="light"] .mic-wrap .ring { border-color: rgba(23,24,27,.25); }
  #card[data-mode="light"] .prompt {
    background: linear-gradient(160deg, rgba(255,255,255,.94), rgba(238,240,243,.96));
    border-color: rgba(20,22,27,.08);
    box-shadow: inset 0 1px 0 #fff;
  }
  #card[data-mode="light"] .prompt .ptext { color: #17181b; }
  #card[data-mode="light"] .prompt .caret { background: #17181b; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition-duration: .01ms !important; }
  }
</style>
</head>
<body>
  <canvas id="px"></canvas>
  <div id="pxgrid"></div>
  <div id="stage">
    <div id="card" class="boot" data-style="original" data-mode="light"></div>
  </div>
  <canvas id="flood"></canvas>

<script>
/* short message — the card must keep its resting height (≤ 2 lines) */
const MESSAGE = 'Slow Butoh rise — hollow the chest, fingers unfurl.';
const PROMPT  = 'Improve my choreography for rehearsal Butoh, make it bold, make it shine';

/* ============================== THEMES ============================== */
/* photo backdrops replaced with translucent tints — the micro-pixel
   display beneath stays visible in every scene */
const THEMES = {
  original: { font: "'Inter', system-ui, sans-serif", w: '336px',
    light: { stage:"radial-gradient(85% 75% at 50% 32%, rgba(200,181,133,.17) 0%, rgba(200,181,133,0) 72%)", card:"#f0ede6", fg:"#1a1a1a", sub:"rgba(26,26,26,.55)", accentbg:"rgba(26,26,26,.06)", chip:"rgba(26,26,26,.06)", border:"1px solid transparent", radius:"28px", shadow:"0 24px 60px rgba(0,0,0,.45)", btnBg:"#1a1a1a", btnFg:"#fff", btnRadius:"999px", modelBg:"rgba(26,26,26,.06)", modelFg:"#1a1a1a" },
    dark:  { stage:"radial-gradient(85% 75% at 50% 32%, rgba(200,181,133,.10) 0%, rgba(200,181,133,0) 72%)", card:"#1a1a1a", fg:"#fff", sub:"rgba(255,255,255,.55)", accentbg:"rgba(255,255,255,.08)", chip:"rgba(255,255,255,.08)", border:"1px solid transparent", radius:"28px", shadow:"0 24px 60px rgba(0,0,0,.55)", btnBg:"#fff", btnFg:"#1a1a1a", btnRadius:"999px", modelBg:"rgba(255,255,255,.08)", modelFg:"#fff" } },

  bento: { font: "'Inter', system-ui, sans-serif", w: '340px',
    light: { stage:"radial-gradient(80% 70% at 30% 20%, rgba(42,182,217,.15) 0%, rgba(42,182,217,0) 65%), radial-gradient(70% 65% at 78% 82%, rgba(90,120,240,.10) 0%, rgba(90,120,240,0) 65%)", card:"#ffffff", fg:"#0e0f11", sub:"rgba(14,15,17,.5)", accentbg:"#eef0f4", chip:"#f3f4f7", border:"1px solid #e7e9ee", radius:"30px", shadow:"0 26px 60px rgba(0,0,0,.5)", btnBg:"#0e0f11", btnFg:"#fff", btnRadius:"16px", modelBg:"#f3f4f7", modelFg:"#0e0f11" },
    dark:  { stage:"radial-gradient(80% 70% at 30% 20%, rgba(42,182,217,.08) 0%, rgba(42,182,217,0) 65%), radial-gradient(70% 65% at 78% 82%, rgba(90,120,240,.06) 0%, rgba(90,120,240,0) 65%)", card:"#0e0f11", fg:"#f5f5f7", sub:"rgba(245,245,247,.5)", accentbg:"#1f2126", chip:"#1a1b1f", border:"1px solid #24262c", radius:"30px", shadow:"0 26px 60px rgba(0,0,0,.55)", btnBg:"#fff", btnFg:"#0e0f11", btnRadius:"16px", modelBg:"#1a1b1f", modelFg:"#f5f5f7" } },

  glass: { font: "'Inter', system-ui, sans-serif", w: '382px',
    light: { stage:"radial-gradient(70% 60% at 22% 18%, rgba(110,160,255,.20) 0%, transparent 60%), radial-gradient(60% 60% at 82% 28%, rgba(80,220,200,.16) 0%, transparent 65%), radial-gradient(80% 70% at 50% 100%, rgba(255,175,150,.14) 0%, transparent 60%)", card:"linear-gradient(160deg, rgba(255,255,255,.80), rgba(255,255,255,.52))", fg:"#14161b", sub:"rgba(20,22,27,.55)", accentbg:"rgba(20,22,27,.07)", chip:"rgba(255,255,255,.55)", border:"1px solid rgba(255,255,255,.85)", radius:"30px", shadow:"0 34px 80px rgba(0,0,0,.5)", btnBg:"linear-gradient(160deg, rgba(255,255,255,.88), rgba(255,255,255,.45))", btnFg:"#14161b", btnBorder:"1px solid rgba(255,255,255,.95)", btnShadow:"inset 0 1px 0 rgba(255,255,255,.95), 0 8px 20px rgba(40,60,100,.22)", btnRadius:"999px", modelBg:"rgba(255,255,255,.6)", modelFg:"#14161b" },
    dark:  { stage:"radial-gradient(70% 60% at 22% 18%, rgba(70,90,130,.20) 0%, transparent 60%), radial-gradient(60% 60% at 82% 28%, rgba(40,120,120,.15) 0%, transparent 65%), radial-gradient(80% 70% at 50% 100%, rgba(50,70,110,.15) 0%, transparent 60%)", card:"linear-gradient(160deg, rgba(26,30,40,.62), rgba(8,10,15,.78))", fg:"#eafaff", sub:"rgba(234,250,255,.6)", accentbg:"rgba(255,255,255,.08)", chip:"rgba(255,255,255,.07)", border:"1px solid rgba(255,255,255,.15)", radius:"30px", shadow:"0 34px 80px rgba(4,10,20,.6)", btnBg:"linear-gradient(160deg, rgba(255,255,255,.22), rgba(255,255,255,.07))", btnFg:"#f6f9fd", btnBorder:"1px solid rgba(255,255,255,.34)", btnShadow:"inset 0 1px 0 rgba(255,255,255,.32), 0 8px 22px rgba(0,0,0,.4)", btnRadius:"999px", modelBg:"rgba(255,255,255,.09)", modelFg:"#eafaff" } },

  voice: { font: "'Inter', system-ui, sans-serif", w: '660px',
    dark:  { stage:"radial-gradient(60% 55% at 50% 38%, rgba(27,28,31,.55) 0%, rgba(8,8,10,.42) 70%, rgba(6,6,7,.32) 100%)", card:"transparent", fg:"#f4f4f5", sub:"rgba(244,244,245,.5)", accentbg:"rgba(255,255,255,.06)", chip:"rgba(255,255,255,.06)", border:"1px solid transparent", radius:"32px", shadow:"none", btnBg:"#fff", btnFg:"#111", btnRadius:"14px", modelBg:"rgba(255,255,255,.06)", modelFg:"#f4f4f5" },
    light: { stage:"radial-gradient(70% 60% at 50% 30%, #eef0f2 0%, #e2e4e7 55%, #d1d4d8 100%)", card:"transparent", fg:"#17181b", sub:"rgba(23,24,27,.5)", accentbg:"rgba(23,24,27,.06)", chip:"rgba(23,24,27,.06)", border:"1px solid transparent", radius:"32px", shadow:"none", btnBg:"#17181b", btnFg:"#fff", btnRadius:"14px", modelBg:"rgba(23,24,27,.06)", modelFg:"#17181b" } },
};

/* ============================== PIXEL DISPLAY ============================== */
/* Full-viewport micro grid rendered 1 cell = 1 pixel on an offscreen canvas,
   scaled up nearest-neighbour so each cell becomes a crisp CELL×CELL block.
   Calibration: cells appear as flickering noise in random clusters, then a
   soft diagonal wave settles each one into its stable value (~800ms total). */
const CELL = 5;                        // css px per pixel cell
const px = document.getElementById('px');
const pctx = px.getContext('2d');
let cols, rows, off, octx, oimg, odata;
let base, tAppear, tResolve, phase;    // per-cell fields
let calibrated = false;

function buildGrid() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  cols = Math.ceil(innerWidth / CELL);
  rows = Math.ceil(innerHeight / CELL);
  px.width = cols * CELL * dpr; px.height = rows * CELL * dpr;
  px.style.width = cols * CELL + 'px'; px.style.height = rows * CELL + 'px';
  pctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  off = document.createElement('canvas'); off.width = cols; off.height = rows;
  octx = off.getContext('2d');
  oimg = octx.createImageData(cols, rows); odata = oimg.data;

  const n = cols * rows;
  base = new Float32Array(n); tAppear = new Float32Array(n);
  tResolve = new Float32Array(n); phase = new Float32Array(n);

  // coarse cluster map: blocks of ~9×9 cells light up together
  const B = 9, bc = Math.ceil(cols / B);
  const clusters = new Float32Array(bc * Math.ceil(rows / B));
  for (let i = 0; i < clusters.length; i++) clusters[i] = Math.random() * 210;

  const cx = cols / 2, cy = rows / 2, maxd = Math.hypot(cx, cy);
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const i = y * cols + x;
      const d = Math.hypot(x - cx, y - cy) / maxd;
      base[i] = 14 + (1 - d * d) * 7 + Math.random() * 7;   // stable image: soft vignette + fine grain
      const appear = clusters[((y / B) | 0) * bc + ((x / B) | 0)] + Math.random() * 60;
      const wave = 200 + ((x + y * 0.35) / (cols + rows * 0.35)) * 420 + Math.random() * 70;
      tAppear[i] = appear;
      tResolve[i] = Math.max(appear + 70, wave);
      phase[i] = Math.random() * Math.PI * 2;
    }
  }
}

function fill(f) {
  let p = 0;
  for (let i = 0; i < base.length; i++) {
    const v = f(i);
    odata[p++] = v * 0.94;          // cool, slightly blue-leaning dark pixels
    odata[p++] = v;
    odata[p++] = v * 1.10 + 2;
    odata[p++] = 255;
  }
}
function flush() {
  octx.putImageData(oimg, 0, 0);
  pctx.imageSmoothingEnabled = false;
  pctx.drawImage(off, 0, 0, cols, rows, 0, 0, cols * CELL, rows * CELL);
}

const SETTLE = 180;                    // ms each cell takes to ease from noise to its value
function calibrate() {
  return new Promise(resolve => {
    const t0 = performance.now();
    const END = 200 + 420 + 70 + SETTLE + 40;   // ≈ 900ms, last cells settle ~800ms in
    (function frame(now) {
      const t = now - t0;
      fill(i => {
        if (t < tAppear[i]) return 4;                        // not yet lit — blends into body bg
        const dt = t - tResolve[i];
        if (dt <= 0) return 6 + Math.random() * 42;          // raw noise flicker
        if (dt < SETTLE) {                                   // easing into the stable image
          const p = dt / SETTLE, e = 1 - (1 - p) * (1 - p) * (1 - p);
          return base[i] + (1 - e) * (Math.random() * 34 - 12);
        }
        return base[i];
      });
      flush();
      if (t < END) requestAnimationFrame(frame);
      else { calibrated = true; resolve(); }
    })(t0);
  });
}

/* ambient: once calibrated the display "breathes" — a slow luminance drift plus
   a handful of single-cell shimmers. Amplitudes are ~1% — almost imperceptible. */
const shimmers = [];
function ambient() {
  let last = 0;
  (function frame(now) {
    requestAnimationFrame(frame);
    if (now - last < 33) return;                 // ~30fps is plenty at this amplitude
    last = now;
    const t = now * 0.00045, sheenT = now * 0.0003;
    fill(i => base[i] + Math.sin(t + phase[i]) * 1.3 + Math.sin(sheenT - (i % cols) * 0.012) * 0.9);
    if (shimmers.length < 24 && Math.random() < .25)
      shimmers.push({ i: (Math.random() * base.length) | 0, t0: now, d: 900 + Math.random() * 1100 });
    for (let s = shimmers.length - 1; s >= 0; s--) {
      const sh = shimmers[s], p = (now - sh.t0) / sh.d;
      if (p >= 1) { shimmers.splice(s, 1); continue; }
      const v = base[sh.i] + Math.sin(p * Math.PI) * 11;
      const o = sh.i * 4;
      odata[o] = v * 0.94; odata[o + 1] = v; odata[o + 2] = v * 1.10 + 2;
    }
    flush();
  })(0);
}

addEventListener('resize', () => {
  buildGrid();
  if (calibrated) { fill(i => base[i]); flush(); }
});

/* ============================================================
   FLOOD WAVE FINALE — from dance-3, recolored: the wave rises
   from the bottom in the display's own pixel palette (cool,
   blue-leaning darks), then crystallises into pixel noise that
   resolves back out into the next scene.
   ============================================================ */
const fl = document.getElementById('flood');
const fctx = fl.getContext('2d');
const FCELL = 5;     // matches the display's cell size
const RCELL = 22;    // wave pixel size (soft)
let FW, FH, fCols, fRows, fseeds, fdelay, fnCv, fnctx, fnimg;
let rCols, rRows, rCv, rctx, rimg;

function floodResize() {
  if (!innerWidth || !innerHeight) return;   // zero-size viewport (hidden tab) — retry later
  FW = fl.width = innerWidth; FH = fl.height = innerHeight;
  fl.style.width = FW + 'px'; fl.style.height = FH + 'px';
  fCols = Math.ceil(FW / FCELL); fRows = Math.ceil(FH / FCELL);
  fnCv = document.createElement('canvas'); fnCv.width = fCols; fnCv.height = fRows;
  fnctx = fnCv.getContext('2d'); fnimg = fnctx.createImageData(fCols, fRows);
  fseeds = new Float32Array(fCols * fRows);
  fdelay = new Float32Array(fCols * fRows);
  for (let y = 0; y < fRows; y++) for (let x = 0; x < fCols; x++) {
    const i = y * fCols + x;
    fseeds[i] = Math.random();
    // random clusters + a wave traveling across the screen
    const cluster = 0.5 + 0.5 * Math.sin(x * 0.33 + 1.7) * Math.sin(y * 0.41 + x * 0.12);
    fdelay[i] = (x / fCols) * 800 + cluster * 260 + Math.random() * 90;
  }
  rCols = Math.ceil(FW / RCELL) + 2; rRows = Math.ceil(FH / RCELL) + 2;
  rCv = document.createElement('canvas'); rCv.width = rCols; rCv.height = rRows;
  rctx = rCv.getContext('2d'); rimg = rctx.createImageData(rCols, rRows);
}
floodResize(); addEventListener('resize', floodResize);

const clamp01 = v => Math.max(0, Math.min(1, v));
const easeOut3 = t => 1 - Math.pow(1 - t, 3);

/* noise cells in the display's palette (same channel weights as the px grid) */
function paintFNoise(t, alphaFn, composite = true) {
  const d = fnimg.data;
  for (let i = 0; i < fCols * fRows; i++) {
    const a = alphaFn(i, t);
    if (a <= 0) { d[i * 4 + 3] = 0; continue; }
    const v = 10 + fseeds[i] * 38 + 4 * Math.sin(t * 0.004 + fseeds[i] * 40);
    d[i * 4] = v * 0.94; d[i * 4 + 1] = v; d[i * 4 + 2] = v * 1.10 + 2;
    d[i * 4 + 3] = Math.round(a * 255);
  }
  fnctx.putImageData(fnimg, 0, 0);
  if (composite) {
    fctx.clearRect(0, 0, FW, FH);
    fctx.imageSmoothingEnabled = false;
    fctx.drawImage(fnCv, 0, 0, fCols * FCELL, fRows * FCELL);
  }
}

/* wave gradient (crest → depth): pale steel highlight sinking into the
   display's blue-leaning dark pixels */
const FSTOPS = [
  [0.00, 158, 168, 196],
  [0.28,  84,  92, 118],
  [0.55,  38,  42,  54],
  [1.00,  13,  14,  18],
];
function fcol(u) {
  u = clamp01(u);
  let i = 0; while (i < FSTOPS.length - 2 && u > FSTOPS[i + 1][0]) i++;
  const a = FSTOPS[i], b = FSTOPS[i + 1];
  const p = (u - a[0]) / (b[0] - a[0]);
  return [a[1] + (b[1] - a[1]) * p, a[2] + (b[2] - a[2]) * p, a[3] + (b[3] - a[3]) * p];
}
function paintWave(t, riseH) {
  const d = rimg.data;
  const topBase = (FH - riseH) / RCELL;
  for (let x = 0; x < rCols; x++) {
    const bump =
      Math.sin(x * 0.52 + t * 0.0028) * 1.7 +
      Math.sin(x * 0.21 - t * 0.0019) * 2.4 +
      Math.sin(x * 1.31 + t * 0.0041) * 0.8;
    const top = topBase + bump;
    for (let y = 0; y < rRows; y++) {
      const i = (y * rCols + x) * 4;
      const depth = y - top;
      if (depth < 0) { d[i + 3] = 0; continue; }
      const c = fcol(depth / 15 + (fseeds[(y * fCols + x * 3) % fseeds.length] - 0.5) * 0.05);
      d[i] = c[0]; d[i + 1] = c[1]; d[i + 2] = c[2];
      d[i + 3] = Math.round(255 * clamp01(depth / 1.2 + 0.35));
    }
  }
  rctx.putImageData(rimg, 0, 0);
  fctx.clearRect(0, 0, FW, FH);
  fctx.imageSmoothingEnabled = true;
  fctx.filter = 'blur(9px)';
  fctx.drawImage(rCv, -RCELL, -RCELL, rCols * RCELL, rRows * RCELL);
  fctx.filter = 'none';
}

/* wave floods the screen bottom-up, midFn swaps the scene behind it,
   then the wave crystallises into pixel noise */
async function floodWave(midFn) {
  if (!fseeds) floodResize();
  if (!fseeds) { midFn(); return; }          // viewport still unmeasurable — skip the wave
  const RISE = 2000;
  await new Promise(res => {
    const t0 = performance.now();
    (function tick(now) {
      const t = now - t0;
      const p = easeOut3(clamp01(t / RISE));
      paintWave(t, p * (FH + 9 * RCELL));   // rise past the top (bumps included)
      if (t < RISE) requestAnimationFrame(tick);
      else res();
    })(t0);
  });
  midFn();   // reset the scene behind the fully-flooded screen
  await new Promise(res => {
    const t0 = performance.now();
    const DUR = 480;
    (function tick(now) {
      const t = now - t0;
      const k = easeOut3(clamp01(t / DUR));
      paintWave(t + RISE, FH + 9 * RCELL);
      paintFNoise(t, (i) => clamp01(k * 1.4 - fseeds[i] * 0.4), false);
      fnctx.putImageData(fnimg, 0, 0);
      fctx.imageSmoothingEnabled = false;
      fctx.drawImage(fnCv, 0, 0, fCols * FCELL, fRows * FCELL);
      if (t < DUR) requestAnimationFrame(tick);
      else { paintFNoise(0, () => 1); res(); }
    })(t0);
  });
}

/* the crystallised noise resolves out, revealing the next scene */
function floodResolve() {
  return new Promise(res => {
    const t0 = performance.now();
    const total = 800 + 260 + 90 + 320;
    (function tick(now) {
      const t = now - t0;
      paintFNoise(t, (i) => 1 - easeOut3(clamp01((t - fdelay[i]) / 300)));
      if (t < total) requestAnimationFrame(tick);
      else { fctx.clearRect(0, 0, FW, FH); res(); }
    })(t0);
  });
}

/* ============================== markup per scene ============================== */
const goBtn = `<button class="upload">
  <span class="lbl">Go dance
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="margin-top:1px"><path d="M2.5 6h7M6.5 3l3 3-3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </span>
  <span class="ok">
    <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2.5 7.5L6 11l5.5-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    On stage
  </span>
</button>`;
const model = `<div class="model">Opus 4.8 ⌄</div>`;
const dotgrid = `<span class="dotgrid"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span>`;
const folder = `<span class="folder"><svg width="17" height="17" viewBox="0 0 20 20" fill="none"><path d="M2.5 5.5A1.5 1.5 0 0 1 4 4h3.6l1.4 1.6H16a1.5 1.5 0 0 1 1.5 1.5v7A1.5 1.5 0 0 1 16 15.6H4a1.5 1.5 0 0 1-1.5-1.5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg></span>`;
const clips = `<div class="clips">${folder}<div class="ct"><b>Rehearsal clips</b><div class="sub2">12 takes</div></div></div>`;

function renderOriginal() {
  return `<div class="pad orig">
    <div class="pills"><b>Dance</b><span class="middot"></span><span class="seed"></span><b>Butoh</b><span class="middot"></span><b class="intensity">boldly ⌄</b></div>
    <div class="activity">${dotgrid}<b>Intro</b><span class="dur">32s</span></div>
    <div class="msg"><span class="typed"></span><span class="caret"></span></div>
    <div class="bottom">${goBtn}${model}</div>
  </div>`;
}
function renderBento() {
  return `<div class="pad bento">
    <div class="tiles">
      <div class="tile"><div class="tl-k">Topic</div><div class="tl-v"><b>Dance</b><span class="middot"></span>Butoh</div></div>
      <div class="tile"><div class="tl-k">Duration</div><div class="tl-v big">32s</div></div>
    </div>
    <div class="tile intro"><div class="tl-k">Intro</div><div class="msg"><span class="typed"></span><span class="caret"></span></div></div>
    ${clips}
    <div class="bottom">${goBtn}${model}</div>
  </div>`;
}
function renderGlass() {
  return `<div class="pad glass">
    <div class="pills"><b>Dance</b><span class="middot"></span><span class="ball3d"></span><b>Butoh</b><span class="middot"></span><b>boldly ⌄</b></div>
    <div class="activity">${dotgrid}<b>Intro</b><span class="dur">32s</span></div>
    <div class="msg"><span class="typed"></span><span class="caret"></span></div>
    ${clips}
    <div class="bottom">${goBtn}${model}</div>
  </div>`;
}
function renderVoice() {
  return `<div class="pad voice">
    <div class="mic-wrap">
      <span class="ring r1"></span><span class="ring r2"></span><span class="ring r3"></span>
      <div class="mic3d"></div>
      <video class="micv" src="assets/mic-anim.mp4" muted playsinline loop preload="auto"></video>
    </div>
    <div class="voice-label">Listening…</div>
    <div class="prompt"><span class="ptext"><span class="typed"></span><span class="caret"></span></span><span class="send">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M19 5v6a3 3 0 0 1-3 3H6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M9.5 10.5L6 14l3.5 3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span></div>
  </div>`;
}

/* ============================== runtime ============================== */
const stage = document.getElementById('stage');
const card  = document.getElementById('card');
const wait  = ms => new Promise(r => setTimeout(r, ms));
let lastStage = null;   // tracks current backdrop for crossfading

function applyTokens(styleKey, mode, instant = false) {
  const th = THEMES[styleKey];
  const t = th[mode];
  const map = {
    '--stage': t.stage, '--card': t.card, '--fg': t.fg, '--sub': t.sub,
    '--accentbg': t.accentbg, '--chip': t.chip, '--border': t.border, '--radius': t.radius,
    '--shadow': t.shadow, '--btn-bg': t.btnBg, '--btn-fg': t.btnFg, '--btn-radius': t.btnRadius,
    '--btn-border': t.btnBorder || 'none', '--btn-shadow': t.btnShadow || 'none',
    '--model-bg': t.modelBg, '--model-fg': t.modelFg, '--font': th.font, '--w': th.w,
  };
  const nextStage = map['--stage'];
  if (!instant && lastStage !== null && lastStage !== nextStage) {
    const ov = document.createElement('div');
    ov.className = 'bgfade';
    ov.style.background = lastStage;              // outgoing backdrop sits on top…
    stage.insertBefore(ov, card);
    requestAnimationFrame(() => {                 // …then fades out, revealing the new one
      ov.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 800, easing: 'ease' })
        .onfinish = () => ov.remove();
    });
  }
  lastStage = nextStage;
  for (const k in map) { stage.style.setProperty(k, map[k]); card.style.setProperty(k, map[k]); }
  card.dataset.style = styleKey;
  card.dataset.mode = mode;
}

function typewriter(el, text, speed = 26) {
  return new Promise(resolve => {
    if (!el) { resolve(); return; }
    const caret = el.parentElement && el.parentElement.querySelector('.caret');
    el.textContent = '';
    const start = performance.now();
    (function tick(now) {
      const n = Math.min(text.length, Math.floor((now - start) / speed));
      el.textContent = text.slice(0, n);
      if (n < text.length) requestAnimationFrame(tick);
      else { if (caret) caret.style.display = 'none'; resolve(); }
    })(start);
  });
}

async function doUpload(fast = false) {
  const btn = card.querySelector('.upload');
  if (!btn) return;
  btn.animate(
    [{ transform:'translateX(0)' },{ transform:'translateX(-5px)' },{ transform:'translateX(5px)' },
     { transform:'translateX(-3px)' },{ transform:'translateX(3px)' },{ transform:'translateX(0)' }],
    { duration: fast ? 260 : 360, easing: 'ease-in-out' });
  await wait(fast ? 300 : 420);
  btn.animate([{ transform:'scale(1)' },{ transform:'scale(.93)' },{ transform:'scale(1)' }], { duration: 180, easing: 'ease-out' });
  await wait(fast ? 90 : 120);
  btn.classList.add('done');
  await wait(fast ? 950 : 1400);
  btn.classList.remove('done');
}

/* ---- transition: fade/scale card out, swap content + tokens ---- */
async function morphTo(styleKey, mode, html, firstPaint = false) {
  if (!firstPaint) { card.classList.add('morphing'); await wait(430); }
  applyTokens(styleKey, mode);
  card.innerHTML = html;
  card.classList.remove('morphing');
  if (firstPaint) {
    // card emerges from the completed display: blur + scale resolve together
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
    card.classList.remove('boot');
    await wait(620);
  } else {
    await wait(480);
  }
}

/* ============================== scenes ============================== */

/* Original card — the only one with full interactions: type + Go dance.
   (No intensity-dropdown change; message stays short so the height holds.) */
async function originalBody() {
  await wait(160);
  await typewriter(card.querySelector('.typed'), MESSAGE, 16);
  await wait(340);
  await doUpload(true);
  await wait(500);
}

/* PYK PYK PYK — the other card states land as instant shots:
   no transitions, no typing, no interactions. */
async function shot(styleKey, mode, html, hold = 620) {
  applyTokens(styleKey, mode, true);
  card.innerHTML = html;
  card.querySelectorAll('.typed').forEach(el => { el.textContent = MESSAGE; });
  card.querySelectorAll('.caret').forEach(c => { c.style.display = 'none'; });
  await wait(hold);
}
async function shots() {
  card.classList.add('snap');
  await shot('original', 'dark',  renderOriginal());
  await shot('bento',    'light', renderBento());
  await shot('bento',    'dark',  renderBento());
  await shot('glass',    'light', renderGlass());
  await shot('glass',    'dark',  renderGlass());
  card.classList.remove('snap');
}

/* Voice — pink mic → typing → silver mic video → wave floods the screen */
async function sceneVoice() {
  await morphTo('voice', 'dark', renderVoice());
  const wrap = card.querySelector('.mic-wrap');
  const mic  = card.querySelector('.mic3d');
  await wait(120);
  if (mic) mic.classList.add('in');
  await wait(360);
  if (wrap) wrap.classList.add('live'); // listening rings pulse
  await wait(700);
  await typewriter(card.querySelector('.ptext .typed'), PROMPT, 34);
  const send = card.querySelector('.send'); if (send) send.classList.add('ready');
  const label = card.querySelector('.voice-label');
  if (label) { label.textContent = 'On it ✦'; label.style.color = 'rgba(255,255,255,.85)'; }
  await wait(1600);

  // silver UI — the mic animation takes over the badge
  applyTokens('voice', 'light');
  if (label) { label.style.color = ''; }             // silver-mode color from CSS
  if (wrap) { wrap.classList.remove('live'); wrap.classList.add('swap'); } // rings off, badge fades out
  const v = card.querySelector('.micv');
  if (v) {
    try { v.currentTime = 0; await v.play(); } catch (e) { /* autoplay guard */ }
    v.classList.add('show');
  }
  await wait(2600);

  // finale — the display's own pixels flood up from the bottom
  await floodWave(prepOriginal);
}

/* reset behind the fully-flooded screen */
function prepOriginal() {
  applyTokens('original', 'light', true);
  card.innerHTML = renderOriginal();
  card.classList.add('boot');
}

async function loop() {
  await morphTo('original', 'light', renderOriginal(), true);
  await originalBody();
  while (true) {
    try {
      await shots();                 // PYK: dark / bento / glass — instant states
      await sceneVoice();            // mic → silver → wave floods the screen
      await floodResolve();          // pixels resolve out into the next pass
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      card.classList.remove('boot'); // card emerges from the display again
      await wait(620);
      await originalBody();
    } catch (e) {
      console.error('dance loop scene failed, recovering', e);
      fctx.clearRect(0, 0, FW, FH);
      await wait(500);
    }
  }
}

/* ---- boot: calibrate the display, then let the card emerge from it ---- */
async function boot() {
  // opened in a background tab: hold the power-on until it's actually watched,
  // otherwise the rAF clock would expire and skip the calibration entirely
  if (document.hidden) await new Promise(r => {
    const h = () => { if (!document.hidden) { removeEventListener('visibilitychange', h); r(); } };
    addEventListener('visibilitychange', h);
  });
  buildGrid();
  applyTokens('original', 'light');    // tint pre-set; #stage is still opacity:0
  if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
    calibrated = true; fill(i => base[i]); flush();
  } else {
    await calibrate();                 // noise → clusters → wave → stable (~800ms)
  }
  ambient();                           // display keeps breathing, imperceptibly
  await wait(150);
  stage.style.opacity = '1';           // tint fades up with the card
  loop();                              // first pass removes .boot → card emerges
}

if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(() => setTimeout(boot, 250));
} else { setTimeout(boot, 400); }
</script>
