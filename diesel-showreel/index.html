<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Diesel · T-shirts & Tops — Showreel</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ── Diesel brand tokens (from live site) ── */
:root{
  --red:#E4002B; --ink:#111113; --white:#fff;
  --grey-bg:#f4f4f4; --grey-border:#e2e2e2; --grey-mid:#9a9a9a; --grey-text:#555;
  --font-display:'Oswald',sans-serif; --font:'DM Sans',-apple-system,sans-serif;
}

/* ── RUNTIME (do not edit) ── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--grey-bg);font-family:var(--font);color:var(--ink);
  -webkit-font-smoothing:antialiased;overflow:hidden}
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.camera{display:flex;align-items:center;justify-content:center;width:100%;height:100%;
  transition:transform 1.1s cubic-bezier(.65,0,.35,1);will-change:transform}
[data-in]{opacity:0;transition:opacity .7s cubic-bezier(.22,1,.36,1),
  transform .7s cubic-bezier(.22,1,.36,1),clip-path .7s cubic-bezier(.22,1,.36,1)}
[data-in=rise]{transform:translateY(22px)}
[data-in=drop]{transform:translateY(-18px)}
[data-in=pop]{transform:scale(.6);transition-timing-function:cubic-bezier(.34,1.56,.64,1)}
[data-in=wipe]{clip-path:inset(0 100% 0 0)}
.in[data-in]{opacity:1;transform:none;clip-path:inset(0 0 0 0)}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.float{animation:floaty 6s ease-in-out infinite}

/* ── DIESEL LISTING CHROME ── */
/* fixed red logo box, top-left corner */
#logo{position:fixed;left:34px;top:28px;z-index:40;background:var(--red);color:#fff;
  padding:8px 13px 7px;line-height:1;transform-origin:left top;
  box-shadow:0 8px 22px rgba(228,0,43,.28);
  opacity:0;transform:translateY(-12px) scale(.92);
  transition:opacity .55s cubic-bezier(.22,1,.36,1),transform .55s cubic-bezier(.34,1.56,.64,1)}
#logo.in{opacity:1;transform:none}
#logo b{display:block;font-family:var(--font-display);font-weight:700;font-size:23px;
  font-style:italic;letter-spacing:.5px}
#logo span{display:block;font-size:6.5px;font-weight:700;letter-spacing:2.2px;margin-top:2px;opacity:.95}

/* thin listing header: breadcrumb + filters + icons */
#topbar{position:fixed;left:0;right:0;top:0;z-index:30;height:78px;pointer-events:none}
#crumbs{position:absolute;left:190px;top:34px;font-size:11px;letter-spacing:.4px;color:var(--grey-text);
  opacity:0;transition:opacity .6s ease}
#crumbs b{color:var(--ink);font-weight:600}
#filters{position:absolute;right:34px;top:26px;display:flex;gap:9px;align-items:center;
  opacity:0;transition:opacity .6s ease}
.hbtn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--ink);background:#fff;
  padding:8px 14px;font-size:11.5px;font-weight:600;letter-spacing:.2px}
.hico{width:30px;height:30px;border:1px solid var(--grey-border);background:#fff;
  display:grid;place-items:center;color:var(--ink)}
#crumbs.on,#filters.on{opacity:1}

/* ── PRODUCT CARD (faithful Diesel card) ── */
#tile{width:320px;background:#fff;border:1px solid var(--red);position:relative;
  box-shadow:0 26px 60px rgba(20,20,25,.14);
  transition:width .9s cubic-bezier(.22,1,.36,1),box-shadow .5s ease,opacity .5s,transform .5s cubic-bezier(.34,1.56,.64,1)}
.imgwrap{position:relative;aspect-ratio:3/4;overflow:hidden;background:#fff}
.imgwrap .ph{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 12%;
  opacity:0;transition:opacity .55s cubic-bezier(.22,1,.36,1)}
.imgwrap .ph.on{opacity:1}
.lib{position:absolute;left:7px;top:16px;writing-mode:vertical-rl;transform:rotate(180deg);
  font-size:7px;font-weight:700;letter-spacing:1.6px;color:var(--red)}
.ar{position:absolute;right:9px;top:9px;display:inline-flex;align-items:center;gap:4px;
  color:var(--red);font-size:9px;font-weight:700;letter-spacing:.2px}
.ar svg{display:block}
.badges{position:absolute;left:8px;bottom:8px;display:flex;gap:5px;align-items:center;flex-wrap:wrap;max-width:88%}
.bdg{background:#fff;border:1px solid var(--ink);padding:3px 6px;font-size:8px;font-weight:700;
  letter-spacing:.4px;text-transform:uppercase;color:var(--ink);
  transform:scale(.4);opacity:0;transition:transform .32s cubic-bezier(.34,1.56,.64,1),opacity .18s}
.bdg.new{border-color:var(--red);color:var(--red)}
.bdg.in{transform:none;opacity:1}
.eco{width:16px;height:16px;border-radius:50%;background:#178A3B;display:inline-grid;place-items:center;
  transform:scale(.4);opacity:0;transition:transform .32s cubic-bezier(.34,1.56,.64,1),opacity .18s}
.eco.in{transform:none;opacity:1}
.heart{position:absolute;right:9px;bottom:9px;color:var(--red);line-height:0}
.meta{padding:9px 11px 12px}
.pname{font-size:12px;font-weight:600;letter-spacing:-.1px;color:var(--ink)}
.prow{display:flex;align-items:baseline;gap:7px;margin-top:5px}
.price{font-size:12.5px;font-weight:700;color:var(--red)}
.was{font-size:11px;color:var(--grey-mid);text-decoration:line-through}
.off{font-size:11px;color:var(--red);font-weight:600}
.colors{display:flex;align-items:center;gap:10px;margin-top:11px}
.colors .lbl{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--grey-mid)}
.dots{display:flex;gap:6px}
.dots i{width:13px;height:13px;border-radius:50%;position:relative;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.14);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.dots i.act{transform:scale(1.15)}
.dots i.act::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1.5px solid var(--ink)}

/* captions */
#cap{position:fixed;left:50%;bottom:46px;transform:translateX(-50%);z-index:35;display:flex;gap:9px;
  opacity:0;transition:opacity .5s ease}
#cap.on{opacity:1}
.capchip{background:#fff;border:1px solid var(--ink);padding:8px 15px;font-size:11.5px;font-weight:700;
  letter-spacing:.3px;display:inline-flex;align-items:center;gap:8px}
.capchip .sw{width:12px;height:12px;border-radius:50%;box-shadow:inset 0 0 0 1px rgba(0,0,0,.15);
  transition:background .5s ease}

/* color sweep highlight */
#sweep{position:absolute;inset:-30% -12%;pointer-events:none;z-index:5;opacity:0;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.7) 50%,transparent 60%);
  transform:translateX(-120%) skewX(-8deg)}

/* gen-z sticker pile */
#pile{position:absolute;inset:0;pointer-events:none;z-index:20}
.stik{position:absolute;font-weight:800;letter-spacing:.3px;white-space:nowrap;padding:10px 16px;
  font-size:18px;box-shadow:0 10px 24px rgba(0,0,0,.18);opacity:0;transform-origin:center;
  font-family:var(--font-display);text-transform:uppercase;
  transition:transform .34s cubic-bezier(.34,1.56,.64,1),opacity .18s}
.stik.emoji{background:none;box-shadow:none;font-size:42px;padding:0;text-transform:none}
.stik.red{background:var(--red);color:#fff}
.stik.black{background:var(--ink);color:#fff}
.stik.lime{background:#C6FF3A;color:var(--ink)}
.stik.white{background:#fff;color:var(--ink);border:1.5px solid var(--ink)}
</style>
</head>
<body>
<div id="logo"><b>DIESEL</b><span>FOR SUCCESSFUL LIVING</span></div>
<div id="topbar">
  <div id="crumbs">Woman&nbsp;&nbsp;•&nbsp;&nbsp;<b>T-shirts &amp; Tops</b></div>
  <div id="filters">
    <span class="hbtn"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M4 8h8M6 12h4"/></svg>Filters &amp; Order by</span>
    <span class="hico"><svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M10 17s-6-4-6-8a3.2 3.2 0 0 1 6-1 3.2 3.2 0 0 1 6 1c0 4-6 8-6 8z"/></svg></span>
    <span class="hico"><svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M5 6h11l-1 8H6zM5 6L4 3H2"/></svg></span>
  </div>
</div>

<div id="stage"><div class="camera" id="cam">

  <div id="tile" class="float" data-in="pop">
    <div class="imgwrap">
      <img class="ph on" src="assets/tee_100.jpg" alt="">
      <img class="ph"    src="assets/tee_61J.jpg" alt="">
      <img class="ph"    src="assets/tee_65C.jpg" alt="">
      <img class="ph"    src="assets/tee_9XX.jpg" alt="">
      <span class="lib">DIESEL LIBRARY</span>
      <span class="ar">Try it on AR
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 5V2h3M14 5V2h-3M2 11v3h3M14 11v3h-3"/><circle cx="8" cy="8" r="2.4"/></svg>
      </span>
      <div class="badges">
        <span class="bdg new">New</span>
        <span class="bdg">Velvet</span>
        <span class="bdg">Member Exclusive</span>
        <span class="eco"><svg width="9" height="9" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="1.3"><path d="M6 1.5c2.5 1 4 3 3 6M6 1.5C3.5 2.5 2 4.5 3 7.5M6 1.5v9"/></svg></span>
      </div>
      <span class="heart"><svg width="17" height="17" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M11 19s-7-4.4-7-9.3A3.7 3.7 0 0 1 11 7a3.7 3.7 0 0 1 7 2.7C18 14.6 11 19 11 19z"/></svg></span>
    </div>
    <div class="meta">
      <div class="pname">T-Angie-OD Fitted logo T-shirt</div>
      <div class="prow"><span class="price">&pound;95.00</span></div>
      <div class="colors">
        <span class="lbl">4 COLORS</span>
        <div class="dots">
          <i style="background:#ededed"></i>
          <i style="background:#6b4a3a"></i>
          <i style="background:#b9a9c4"></i>
          <i style="background:#16161a"></i>
        </div>
      </div>
    </div>
    <div id="sweep"></div>
  </div>

  <div id="pile"></div>

</div></div>

<div id="cap"><span class="capchip"><span class="sw" style="background:#ededed"></span><span id="cname">White</span></span><span class="capchip" id="sizechip" style="display:none">Regular</span></div>

<script>
/* ── TIMELINE RUNTIME ── */
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const T=[]; const at=(ms,fn)=>T.push(setTimeout(fn,ms));
const show=sel=>{const el=typeof sel==='string'?$(sel):sel; el&&el.classList.add('in')};
const stagger=(ms,gap,els,fn)=>els.forEach((el,i)=>at(ms+i*gap,()=>fn?fn(el,i):el.classList.add('in')));
function camera(scale=1,x=0,y=0,dur=1100){const c=$('#cam');
  c.style.transitionDuration=dur+'ms'; c.style.transform=`translate(${x}px,${y}px) scale(${scale})`}
const loop=total=>at(total,()=>location.reload());
window.SCENE={at,show,stagger,camera,loop,$,$$};

/* ══ DIESEL SHOWREEL TIMELINE ══ */
// real colorways of A19912_0AFAA (White / Brown / Lilac / Black)
const COLORS=[
  {name:'White',            sw:'#ededed'},
  {name:'Chocolate Brown',  sw:'#6b4a3a'},
  {name:'Lilac',            sw:'#b9a9c4'},
  {name:'Black',            sw:'#16161a'},
];
function sweep(){
  const s=$('#sweep'); s.style.transition='none'; s.style.opacity=0;
  s.style.transform='translateX(-120%) skewX(-8deg)';
  requestAnimationFrame(()=>{
    s.style.transition='transform .8s cubic-bezier(.65,0,.35,1),opacity .8s ease';
    s.style.opacity=1; s.style.transform='translateX(120%) skewX(-8deg)';
    setTimeout(()=>{s.style.opacity=0;},700);
  });
}

// intro
SCENE.at(200,()=>{SCENE.show('#logo');$('#crumbs').classList.add('on');});
SCENE.at(500,()=>SCENE.show('#tile'));
SCENE.at(950,()=>SCENE.stagger(0,110,SCENE.$$('.badges .bdg, .badges .eco')));
SCENE.at(1250,()=>{$('#cap').classList.add('on');$('#filters').classList.add('on');});
SCENE.at(1100,()=>camera(1.12,0,-4,1300));

// BEAT 1 · change colors — swap the real colorway photo + swatch + light sweep
const imgs=SCENE.$$('.imgwrap .ph');
const cBase=1800;
COLORS.forEach((c,i)=>SCENE.at(cBase+i*1150,()=>{
  imgs.forEach((im,k)=>im.classList.toggle('on',k===i));
  SCENE.$$('.dots i').forEach((d,k)=>d.classList.toggle('act',k===i));
  SCENE.$('#cname').textContent=c.name;
  SCENE.$('#cap .sw').style.background=c.sw;
  sweep();
}));

// BEAT 2 · scale the card box to different sizes
const sStart=cBase+COLORS.length*1150+300;         // ~6400
SCENE.at(sStart-350,()=>{camera(1,0,0,1200);$('#sizechip').style.display='inline-flex';});
const SIZES=[{w:250,l:'Compact · S'},{w:320,l:'Regular · M'},{w:400,l:'Large · L'}];
SIZES.forEach((z,i)=>SCENE.at(sStart+i*1150,()=>{
  SCENE.$('#tile').style.width=z.w+'px';
  SCENE.$('#sizechip').textContent=z.l;
}));
const stickBase=sStart+SIZES.length*1150+300;       // ~10150
SCENE.at(stickBase-450,()=>{SCENE.$('#tile').style.width='340px';$('#sizechip').style.display='none';});

// BEAT 3 · gen-z sticker slaps
const STICKERS=[
  {h:'New Drop ✦',c:'red',   x:300, y:120, r:-8},
  {h:'★',         c:'emoji', x:470, y:52,  r:0},
  {h:'🔥',        c:'emoji', x:820, y:96,  r:0},
  {h:'-30%',      c:'black', x:850, y:340, r:9},
  {h:'Sale',      c:'red',   x:830, y:540, r:-7},
  {h:'so hot rn', c:'lime',  x:300, y:540, r:6},
  {h:'shop the look',c:'white',x:250,y:340, r:-5},
  {h:'♥',         c:'emoji', x:470, y:600, r:0},
];
STICKERS.forEach((s,i)=>SCENE.at(stickBase+i*300,()=>{
  const el=document.createElement('div'); el.className='stik '+s.c; el.textContent=s.h;
  el.style.left=s.x+'px'; el.style.top=s.y+'px'; el.style.transform=`rotate(${s.r}deg) scale(1.7)`;
  SCENE.$('#pile').appendChild(el);
  requestAnimationFrame(()=>{el.style.opacity=1;el.style.transform=`rotate(${s.r}deg) scale(1)`;});
}));
SCENE.at(stickBase,()=>camera(1.02,0,0,900));

SCENE.loop(stickBase+STICKERS.length*300+2600);
</script>
</body>
</html>
