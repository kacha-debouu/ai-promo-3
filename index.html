<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ai-promo · gallery</title>
<link rel="preload" href="fonts/SequelSans-RomanDisp.ttf" as="font" type="font/ttf" crossorigin />
<link rel="preload" href="fonts/SequelSans-RomanHead.ttf" as="font" type="font/ttf" crossorigin />
<style>
  @font-face{
    font-family:"Sequel Sans";
    src:local("Sequel Sans Roman Disp"), local("SequelSans-RomanDisp"),
        url("fonts/SequelSans-RomanDisp.ttf") format("truetype");
    font-weight:400; font-style:normal; font-display:swap;
  }
  @font-face{
    font-family:"Sequel Sans Head";
    src:local("Sequel Sans Roman Head"), local("SequelSans-RomanHead"),
        url("fonts/SequelSans-RomanHead.ttf") format("truetype");
    font-weight:400; font-style:normal; font-display:swap;
  }
  :root{
    /* Widelab brand tokens — widelab.co */
    --ink:#151515; --bg:#f6f6f6; --card:#ffffff; --purple:#4734f7; --purple-tint:#edebfe; --yellow:#e6ff27;
    --sec:#7a7a7a; --faint:#a3a3a3;
    --stroke:#ebebeb; --stroke-2:#d9d9d9;
    --font-disp:"Sequel Sans","Helvetica Neue","Arial",sans-serif;
    --font-head:"Sequel Sans Head","Sequel Sans","Helvetica Neue","Arial",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--font-disp);
    min-height:100vh; display:flex; flex-direction:column;
    background-image:radial-gradient(120% 70% at 50% -10%, #ffffff 0%, #f3f3f3 60%);
  }
  a{color:inherit;text-decoration:none}

  /* ---- shell ---- */
  .wrap{width:100%; max-width:1180px; margin:0 auto; padding:clamp(40px,6vw,88px) clamp(24px,5vw,48px) 80px; flex:1 0 auto}
  header.top{display:flex; align-items:center; justify-content:space-between; gap:24px}
  .brand{position:relative; width:118px; height:26px; opacity:0; animation:fade .6s .05s forwards}
  .brand .wm{position:absolute}
  .brand .wm img{width:100%;height:100%;display:block}
  .top .tag{font-size:13px; letter-spacing:.04em; color:var(--sec); opacity:0; animation:fade .6s .15s forwards}

  .hero{margin:clamp(48px,9vw,104px) 0 clamp(36px,6vw,64px)}
  .hero h1{
    font-family:var(--font-head); font-weight:400; line-height:1.02;
    font-size:clamp(40px,7vw,76px); letter-spacing:-.018em;
    opacity:0; animation:rise .7s .12s cubic-bezier(.2,.7,.2,1) forwards;
  }
  .hero h1 .dim{color:#b3b3b3}
  .hero p{
    margin-top:18px; max-width:560px; font-size:clamp(15px,1.5vw,17px);
    line-height:1.5; color:var(--sec);
    opacity:0; animation:rise .7s .22s cubic-bezier(.2,.7,.2,1) forwards;
  }

  /* ---- grid ---- */
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:24px}

  .tile{
    position:relative; border:1px solid var(--stroke); border-radius:16px;
    background:var(--card); overflow:hidden; display:flex; flex-direction:column;
    opacity:0; transform:translateY(16px);
    animation:rise .7s cubic-bezier(.2,.7,.2,1) forwards; animation-delay:var(--d,.3s);
    transition:border-color .35s, transform .35s, box-shadow .35s;
  }
  .tile:hover{transform:translateY(-4px); border-color:var(--stroke-2); box-shadow:0 24px 60px -28px rgba(21,21,21,.20)}

  /* thumbnail — live auto-looping promo */
  .thumb{
    position:relative; aspect-ratio:16/10; overflow:hidden;
    background:#ebebeb; border-bottom:1px solid var(--stroke); display:block;
  }
  .thumb iframe{position:absolute; inset:0; width:100%; height:100%; border:none; pointer-events:none; transform-origin:top left}
  .thumb .live{
    position:absolute; top:14px; right:14px; display:inline-flex; align-items:center; gap:6px;
    background:rgba(21,21,21,.85); backdrop-filter:blur(6px); padding:5px 12px; border-radius:999px;
    font-size:11px; color:#fff; letter-spacing:.3px;
  }
  .thumb .live::before{content:''; width:6px; height:6px; border-radius:50%; background:#37ff7a; box-shadow:0 0 8px rgba(55,255,122,.5); animation:live 1.6s ease-in-out infinite}

  /* meta row */
  .meta{padding:20px 22px 22px; display:flex; flex-direction:column; gap:16px; flex:1}
  .meta .row{display:flex; align-items:baseline; justify-content:space-between; gap:12px}
  .meta h2{font-size:18px; font-weight:400; letter-spacing:-.01em}
  .meta h2 em{font-style:normal; color:var(--faint)}
  .meta .count{font-size:12.5px; color:var(--sec); white-space:nowrap}
  .meta .desc{font-size:13.5px; line-height:1.5; color:#656565; margin-top:-4px}

  .versions{display:flex; flex-wrap:wrap; gap:10px; margin-top:auto; align-items:center}
  .ver{
    display:inline-flex; align-items:center; gap:8px;
    padding:9px 15px; border:1px solid var(--stroke-2); border-radius:999px;
    font-size:13.5px; color:var(--ink); background:#fff;
    transition:background .25s, border-color .25s, color .25s, transform .25s;
  }
  .ver .glyph{font-size:11px; color:var(--sec); transition:transform .25s, color .25s}
  .ver:hover{background:var(--purple); border-color:var(--purple); color:#fff}
  .ver:hover .glyph{transform:translateX(3px); color:#fff}
  .tag-pill{
    display:inline-flex; align-items:center; padding:8px 13px; border-radius:999px;
    border:1px solid var(--stroke); font-size:12.5px; color:var(--sec); background:transparent;
  }

  footer{flex-shrink:0; padding:26px clamp(24px,5vw,48px); border-top:1px solid var(--stroke);
    display:flex; justify-content:space-between; align-items:center; color:var(--faint); font-size:12.5px}
  footer a{color:var(--sec)}
  footer a:hover{color:var(--ink)}

  @keyframes fade{to{opacity:1}}
  @keyframes rise{to{opacity:1;transform:none}}
  @keyframes live{0%,100%{opacity:1}50%{opacity:.35}}
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important; opacity:1!important; transform:none!important}
  }
  @media (max-width:560px){
    .grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="brand" aria-label="widelab">
        <span class="wm" style="inset:24.45% 75.15% 2.3% 0"><img src="assets/w0.svg" alt=""></span>
        <span class="wm" style="inset:0 53.59% 0 31.51%"><img src="assets/w1.svg" alt=""></span>
        <span class="wm" style="inset:21.04% 37.27% 0.2% 48.51%"><img src="assets/w2.svg" alt=""></span>
        <span class="wm" style="inset:0.03% 0 0.02% 85.07%"><img src="assets/w3.svg" alt=""></span>
        <span class="wm" style="inset:21.7% 17.18% 0.65% 70.25%"><img src="assets/w4.svg" alt=""></span>
        <span class="wm" style="inset:0 31.78% 2.22% 64.78%"><img src="assets/w5.svg" alt=""></span>
        <span class="wm" style="inset:24.46% 70.67% 2.31% 25.89%"><img src="assets/w6.svg" alt=""></span>
      </div>
      <span class="tag">Promo gallery</span>
    </header>

    <section class="hero">
      <h1>Looping product promos,<br><span class="dim">built from Figma flows.</span></h1>
      <p>A living library of self-contained, auto-looping micro-promos — each one recreates
         a product flow as a Dribbble-style shot. Pick a card to view it full-screen.</p>
    </section>

    <main class="grid" id="grid"></main>
  </div>

  <footer>
    <span>© Widelab · auto-looping promos</span>
    <a href="https://github.com/widelab-design/ai-promo-3" target="_blank" rel="noopener">github ↗</a>
  </footer>

  <script>
    /* ── Promo gallery ─────────────────────────────────────────────
       Add a promo = add an object. `live:true` shows the auto-looping
       "Live" badge. `href` opens the full-screen promo.                */
    const PROMOS = [
      {
        name: ['Wideset DS', '— Brandbook Restyle'],
        count: '8 scenes',
        desc: 'Claude restyles a design system from a brandbook: prompt in the Claude app → Figma tokens sweep violet → bottle-green → the omnisearch morphs styles, toggles light/dark and reflows mobile→desktop → a Wideset → Claude+Figma → Claude+Storybook workflow → a bubble-pop grid of components in light, dark-green and B&W → Widelab outro.',
        href: './design-system/',
        tags: ['React', 'framer-motion'],
      },
      {
        name: ['ai-promo', '— 9 Style Variants'],
        count: '9 scenes',
        desc: 'The original promo: one AI-assistant “upload your routine” flow recreated in nine visual treatments — Bento OS, Glass 2.0, Neo-brutalism, Y2K Chrome, Cyberpunk Terminal, Claymorphic and more. Auto-loops typewriter → long-press → upload success.',
        href: 'https://ai-promo.pages.dev/',
        tags: ['React', 'framer-motion'],
      },
      {
        name: ['ArangoDB', '— Widelab prototype'],
        count: '4 scenes',
        desc: 'Recreated from the Widelab design prototype, pixel-true to its real tokens (#127920 brand, Inter + IBM Plex Mono). Cycles Dashboard → Query Editor with AQLizer chat → Collections → Graph preview.',
        href: './arangodb-2/',
        tags: ['HTML', 'AQLizer'],
      },
      {
        name: ['ArangoDB', '— Contextual Data Platform'],
        count: '5 scenes',
        desc: 'First take: Dashboard, Collections, AQL editor with live typewriter + result stream, an interactive Graph view, and AutoGraph entity extraction.',
        href: './arangodb/',
        tags: ['HTML', 'SVG charts'],
      },
      {
        name: ['BioPathAI', '— RNA Sequence Review'],
        count: '13 frames',
        desc: 'Multi-agent research workflow: Core Agent → PaperQA gathering evidence, file uploads, and a review-action modal. Loops through all 13 progressive states.',
        href: './biopath/',
        tags: ['HTML', 'SVG avatars'],
      },
      {
        name: ['boards.so', '— Chat & Boards'],
        count: '4 scenes',
        desc: 'iPhone mockup running chat → boards picker → long-press menu → voice listening, on a magenta/blue Dribbble-style stage. Built with Vite + React + framer-motion.',
        href: 'https://ai-promo-2.pages.dev/',
        tags: ['React', 'framer-motion'],
      },
    ];

    const grid = document.getElementById('grid');
    PROMOS.forEach((p, i) => {
      const tile = document.createElement('article');
      tile.className = 'tile';
      tile.style.setProperty('--d', (0.30 + i * 0.08).toFixed(2) + 's');

      const tags = (p.tags || []).map(t => `<span class="tag-pill">${t}</span>`).join('');

      tile.innerHTML = `
        <a class="thumb" href="${p.href}" target="_blank" rel="noopener" aria-label="${p.name[0]} ${p.name[1] || ''}">
          <iframe src="${p.href}" loading="lazy" sandbox="allow-scripts allow-same-origin" scrolling="no"></iframe>
          <span class="live">Live</span>
        </a>
        <div class="meta">
          <div class="row"><h2>${p.name[0]} <em>${p.name[1] || ''}</em></h2><span class="count">${p.count}</span></div>
          <p class="desc">${p.desc}</p>
          <div class="versions">
            <a class="ver" href="${p.href}" target="_blank" rel="noopener"><span>Open</span><span class="glyph">→</span></a>
            ${tags}
          </div>
        </div>`;
      grid.appendChild(tile);
    });

    /* Scale iframes down so the full UI is visible inside the thumb area. */
    function fitThumbs(){
      document.querySelectorAll('.thumb iframe').forEach(f => {
        const target = 1440;        // pretend desktop width
        const thumb = f.parentElement;
        const w = thumb.clientWidth;
        const scale = w / target;
        f.style.width = target + 'px';
        f.style.height = (target * (10/16)) + 'px';
        f.style.transform = `scale(${scale})`;
      });
    }
    window.addEventListener('load', fitThumbs);
    window.addEventListener('resize', fitThumbs);
  </script>
</body>
</html>
