<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Widelab — Motion</title>
<link rel="preload" href="fonts/SequelSans-RomanDisp.woff2" as="font" type="font/woff2" crossorigin />
<link rel="preload" href="fonts/SequelSans-MediumDisp.woff2" as="font" type="font/woff2" crossorigin />
<style>
  /* EXACT widelab.co webfonts — Sequel Sans Disp, Roman 400 + Medium 500 */
  @font-face{
    font-family:"Sequel Sans Disp";
    src:url("fonts/SequelSans-RomanDisp.woff2") format("woff2");
    font-weight:400; font-style:normal; font-display:swap;
  }
  @font-face{
    font-family:"Sequel Sans Disp";
    src:url("fonts/SequelSans-MediumDisp.woff2") format("woff2");
    font-weight:500; font-style:normal; font-display:swap;
  }
  :root{
    /* Decks tile system, flipped to LIGHT — white stage, dark ink */
    --bg:#ffffff; --ink:#0f0f0f; --sec:#767676; --line:#ececec; --line2:#e2e2e2;
    --chip:#f1f1f1; --chip-h:#e7e7e7; --purple:#4734f7; --purple-h:#5b4bff;
    --font-disp:"Sequel Sans Disp","Helvetica Neue","Arial",sans-serif;
    --font-head:"Sequel Sans Disp","Helvetica Neue","Arial",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
  /* widelab.co base: 1rem / 1.2 */
  body{background:var(--bg); color:var(--ink); font-family:var(--font-disp);
    font-size:1rem; line-height:1.2;
    min-height:100vh; display:flex; flex-direction:column}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--purple); color:#fff}
  a:focus-visible{outline:2px solid var(--purple); outline-offset:3px; border-radius:2px}

  /* ───── top nav (light) ───── */
  .nav{position:sticky; top:0; z-index:50; display:grid; grid-template-columns:1fr auto 1fr;
    align-items:center; gap:24px; padding:22px clamp(24px,4vw,54px);
    background:rgba(255,255,255,.82); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid transparent; transition:border-color .3s}
  .nav.is-stuck{border-color:var(--line)}
  .nav-links{display:flex; align-items:center; gap:32px; font-size:1rem; line-height:1.2}
  .nav-links a{color:var(--ink); opacity:.9; transition:opacity .2s}
  .nav-links a:hover{opacity:.5}
  .nav-links a.is-current{text-decoration:underline; text-underline-offset:4px; text-decoration-thickness:1px}
  .nav-links a.soon{opacity:.4; cursor:default}
  .nav-links a.soon:hover{opacity:.4}
  .nav-brand{justify-self:center; position:relative; display:block; height:25px; aspect-ratio:5.42}
  .nav-brand .wm{position:absolute}
  /* wordmark SVGs are ink-fill (#151515) — no invert needed on the light stage */
  .nav-brand .wm img{width:100%; height:100%; display:block}

  /* ───── shell ───── */
  .wrap{width:100%; max-width:1360px; margin:0 auto; padding:0 clamp(24px,4vw,54px) 64px; flex:1 0 auto}

  /* ───── hero — EXACT widelab.co services hero scale ───── */
  .hero{padding:clamp(32px,5vw,72px) 0 clamp(26px,4vw,48px)}
  /* h2.hero_headline: 5rem / lh 1 / ls -.05rem; ≤991px: 3.75rem/-.037rem; ≤767px: 3rem/-.03rem */
  .hero h1{font-family:var(--font-head); font-weight:400; margin:0;
    font-size:5rem; line-height:1; letter-spacing:-.05rem; max-width:74rem}
  .hero h1 .dim{color:#b6b6b6}
  /* widelab.co p: 1.5rem / 1.333 / +.03rem; ≤767px: 1.125rem / +.022rem */
  .hero p{margin-top:28px; max-width:620px; font-size:1.5rem;
    line-height:1.333; letter-spacing:.03rem; color:var(--sec)}
  @media (max-width:991px){ .hero h1{font-size:3.75rem; letter-spacing:-.037rem} }
  @media (max-width:767px){
    .hero h1{font-size:3rem; letter-spacing:-.03rem}
    .hero p{font-size:1.125rem; letter-spacing:.022rem}
  }

  /* ───── toolbar / filters — Decks pattern, flipped to light ───── */
  .toolbar{display:flex; align-items:center; justify-content:space-between; gap:20px;
    flex-wrap:wrap; margin:0 0 40px;
    /* own stacking context ABOVE the grid so open dropdowns never hide behind tiles */
    position:relative; z-index:40}
  .toolbar-left{display:flex; align-items:center; gap:16px}
  .toolbar .count-total{font-size:.875rem; line-height:1.2; color:var(--sec)}
  .clear{display:none; font-family:var(--font-disp); font-size:13px; color:#7a7a7a; cursor:pointer;
    background:none; border:none; border-bottom:1px solid #cfcfcf; padding:0 0 2px; transition:color .2s, border-color .2s}
  .clear:hover{color:var(--ink); border-color:var(--ink)}
  .clear.show{display:inline-block}
  .filterbar{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .fgroup{position:relative}
  .pill{font-family:var(--font-disp); font-size:.9375rem; line-height:1.2; color:var(--ink); cursor:pointer;
    background:var(--chip); border:1px solid transparent; border-radius:999px;
    padding:10px 18px; display:inline-flex; align-items:center; gap:8px;
    transition:background .2s, color .2s}
  .pill:hover{background:var(--chip-h)}
  .pill .chev{width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;
    border-top:5px solid #8c8c8c; transition:transform .2s}
  .fgroup.open .pill,.pill.is-active{background:#151515; color:#fff}
  .fgroup.open .pill .chev,.pill.is-active .chev{border-top-color:#fff}
  .fgroup.open .pill .chev{transform:rotate(180deg)}
  .pill .badge{font-size:12px; background:rgba(255,255,255,.24); color:#fff; border-radius:999px;
    min-width:18px; height:18px; padding:0 5px; display:inline-grid; place-items:center}
  .pill:not(.is-active) .badge{display:none}
  .funnel{width:44px; height:44px; border-radius:999px; background:var(--chip); border:none; cursor:pointer;
    color:#5c5c5c; display:grid; place-items:center; transition:background .2s}
  .funnel:hover{background:var(--chip-h)}
  .funnel svg{width:17px;height:17px}

  .dropdown{position:absolute; top:calc(100% + 10px); right:0; z-index:60; min-width:236px;
    background:#fff; border:1px solid var(--line2); border-radius:18px; padding:8px;
    box-shadow:0 30px 64px -26px rgba(20,20,45,.35); display:none}
  .fgroup.open .dropdown{display:block; animation:pop .16s ease}
  @keyframes pop{from{opacity:0; transform:translateY(-4px)} to{opacity:1; transform:none}}
  .opt{display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:11px; cursor:pointer;
    font-size:.9375rem; line-height:1.2; transition:background .15s}
  .opt:hover{background:#f5f5f5}
  .opt input{appearance:none; -webkit-appearance:none; width:19px; height:19px; flex:none;
    border:1.6px solid #d9d9d9; border-radius:5px; cursor:pointer; position:relative; transition:.15s}
  .opt input:checked{background:var(--purple); border-color:var(--purple)}
  .opt input:checked::after{content:""; position:absolute; left:6px; top:2.5px; width:5px; height:9px;
    border:solid #fff; border-width:0 2px 2px 0; transform:rotate(42deg)}
  .opt .txt{flex:1}
  .opt .n{color:#a3a3a3; font-size:14px}
  .opt.is-zero{opacity:.4}

  /* ───── grid + tiles — Decks case-study layout, light ─────
     flat tiles, no box: cover + content stacked, sharp corners, hairline frame */
  .grid{display:grid; grid-template-columns:repeat(3,1fr); column-gap:1.5rem; row-gap:3.5rem}
  .empty{grid-column:1/-1; padding:80px 0; text-align:center; color:var(--sec); font-size:1rem}

  .tile{position:relative; border:none; border-radius:0; background:transparent;
    display:flex; flex-direction:column; row-gap:1.25rem;
    opacity:0; transform:translateY(14px);
    animation:rise .6s cubic-bezier(.2,.7,.2,1) forwards; animation-delay:var(--d,.2s)}

  /* full-bleed cover — hairline frame, sharp corners (widelab.co).
     each scene renders at 1280×720 and the whole iframe is scaled to the thumb (JS) */
  .thumb{position:relative; aspect-ratio:16/9; overflow:hidden; width:100%; display:block;
    border:1px solid var(--line); border-radius:0; background:#f2f1ee; transition:border-color .3s}
  .tile:hover .thumb{border-color:#d8d8d8}
  .thumb .cover{position:absolute; top:0; left:0; width:1280px; height:720px; border:0;
    transform-origin:0 0; pointer-events:none; background:#f2f1ee; z-index:1}

  /* labels — widelab.co category-badge: radius 1rem, .5rem .7rem, .7rem text.
     story = purple · showcase/prototype = white · live = white + green dot */
  .chips{position:absolute; top:1.1rem; right:1.1rem; z-index:3; display:flex; gap:8px; align-items:center}
  .tagchip{font-family:var(--font-disp); font-size:.7rem; letter-spacing:.05em; text-transform:uppercase;
    padding:.5rem .7rem; border-radius:1rem; line-height:1; display:inline-flex; align-items:center; gap:7px;
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px)}
  .tagchip--story{background:rgba(71,52,247,.82); color:#fff}
  .tagchip--kind{background:rgba(255,255,255,.9); color:#151515; border:1px solid rgba(0,0,0,.08)}
  .tagchip--live{background:rgba(255,255,255,.9); color:#151515; border:1px solid rgba(0,0,0,.08)}
  .tagchip--live .dot{width:7px;height:7px;border-radius:50%;background:#19c37d;
    box-shadow:0 0 0 0 rgba(25,195,125,.6); animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(25,195,125,.55)}70%{box-shadow:0 0 0 7px rgba(25,195,125,0)}100%{box-shadow:0 0 0 0 rgba(25,195,125,0)}}

  /* content flush with the cover edge */
  .meta{padding:0; display:flex; flex-direction:column; gap:.85rem; flex:1}
  .meta .row{display:flex; align-items:baseline; justify-content:space-between; gap:14px}
  /* .is-h4: 2rem / 1.188 / -.02rem, weight 500, text-wrap balance */
  .meta h2{font-family:var(--font-head); font-size:2rem; font-weight:500; line-height:1.188;
    letter-spacing:-.02rem; text-wrap:balance; color:var(--ink)}
  .meta h2 em{font-style:normal; font-weight:400; color:#b0b0b0}
  .meta .count{font-size:1.125rem; line-height:1.333; letter-spacing:.022rem; color:var(--sec); white-space:nowrap}
  /* .is-p-l: 1.125rem / 1.333 / +.022rem */
  .meta .desc{font-size:1.125rem; line-height:1.333; letter-spacing:.022rem; color:#8f8f8f}
  /* links — deck underlined rows, with a muted stack label */
  .versions{display:flex; flex-wrap:wrap; align-items:baseline; gap:.5rem 1.1rem; margin-top:auto}
  .ver{display:inline-flex; align-items:center; gap:8px; padding:0; border:none; background:none;
    font-size:1.125rem; line-height:1.6; letter-spacing:.022rem; color:var(--ink);
    text-decoration:underline; text-underline-offset:3px; text-decoration-thickness:1px;
    transition:color .2s}
  .ver .glyph{font-size:.8125rem; color:var(--sec); transition:transform .2s, color .2s}
  .ver:hover{color:var(--purple-h)}
  .ver:hover .glyph{transform:translateX(3px); color:var(--purple-h)}
  .stackchip{font-size:1rem; line-height:1.6; letter-spacing:.02rem; color:var(--sec)}

  footer{flex-shrink:0; padding:26px clamp(24px,4vw,54px); border-top:1px solid var(--line);
    display:flex; justify-content:space-between; align-items:center; color:var(--sec); font-size:12.5px}
  footer a:hover{color:var(--ink)}

  @keyframes rise{to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important; opacity:1!important; transform:none!important}}
  @media (max-width:1100px){ .grid{grid-template-columns:repeat(2,1fr); row-gap:3rem} }
  @media (max-width:720px){ .nav-links{display:none} }
  @media (max-width:620px){
    .grid{grid-template-columns:1fr; row-gap:2.5rem}
    .nav{grid-template-columns:auto auto; gap:14px}
    .nav-brand{justify-self:start}
    .toolbar{align-items:flex-start; flex-direction:column}
  }
</style>
</head>

        cat:'prototype', product:'biopath', stack:'html',
        count: '13 frames',
        desc: 'Multi-agent research workflow: Core Agent → PaperQA gathering evidence, file uploads, and a review-action modal. Loops through all 13 progressive states.',
        href: './biopath/',
      },
      {
        name: 'Oktopost — AI Copilot',
        title: ['Oktopost', '— AI Copilot'],
        cat:'prototype', product:'oktopost', stack:'html',
        count: '4 beats · 14s',
        desc: 'The advocacy dashboard wakes up: a slow camera push over the campaign table, a cursor hover, then a dive into the AI panel — Analyze lights up, a question types itself, and the copilot starts thinking. Rebuilt pixel-true from the Figma exploration.',
        href: './oktopost-ai/',
      },
      {
        name: 'boards.so — Chat & Boards',
        title: ['boards.so', '— Chat & Boards'],
        cat:'prototype', product:'boards', stack:'react',
        count: '4 scenes',
        desc: 'iPhone mockup running chat → boards picker → long-press menu → voice listening, on a magenta/blue Dribbble-style stage.',
        href: 'https://ai-promo-2.pages.dev/',
      },
    ];

    /* ── filter dimensions ── */
    const FILTERS = [
      { key:'cat',     label:'Category', opts:[['showcase','Showcase'],['story','Story'],['prototype','Prototype']] },
      { key:'product', label:'Product',  opts:[['wideset','Wideset'],['arangodb','ArangoDB'],['biopath','BioPathAI'],['boards','boards.so'],['oktopost','Oktopost'],['other','Other']] },
      { key:'stack',   label:'Stack',    opts:[['react','React + framer-motion'],['html','HTML + SVG']] },
    ];
    const sel = { cat:new Set(), product:new Set(), stack:new Set() };
    const countFor = (key,val) => PROMOS.filter(d => (d[key]||'') === val).length;

    const CAT_LABEL = { showcase:'Showcase', story:'Story', prototype:'Prototype' };
    const STACK_LABEL = { react:'React · framer-motion', html:'HTML · SVG' };

    /* ── render tiles ── */
    const grid = document.getElementById('grid');
    const cards = [];
    // medium single-concept showcases (low:true) sort to the bottom; order otherwise preserved
    const ORDERED = PROMOS.slice().sort((a, b) => (a.low ? 1 : 0) - (b.low ? 1 : 0));
    ORDERED.forEach((p, i) => {
      const tile = document.createElement('article');
      tile.className = 'tile';
      tile.style.setProperty('--d', (0.10 + i * 0.06).toFixed(2) + 's');

      const catCls = p.cat === 'story' ? 'tagchip tagchip--story' : 'tagchip tagchip--kind';
      const chips = `<span class="${catCls}">${CAT_LABEL[p.cat]}</span>
                     <span class="tagchip tagchip--live"><span class="dot"></span>Live</span>`;

      tile.innerHTML = `
        <div class="chips">${chips}</div>
        <a class="thumb" href="${p.href}" target="_blank" rel="noopener" aria-label="${p.name}">
          <iframe class="cover" src="${p.href}" loading="lazy" scrolling="no" tabindex="-1"
                  sandbox="allow-scripts allow-same-origin" aria-hidden="true" title="${p.name} — preview"></iframe>
        </a>
        <div class="meta">
          <div class="row"><h2>${p.title[0]} <em>${p.title[1] || ''}</em></h2><span class="count">${p.count}</span></div>
          <div class="versions">
            <span class="stackchip">${STACK_LABEL[p.stack]}</span>
          </div>
        </div>`;
      grid.appendChild(tile);
      cards.push({ el: tile, d: p });
    });

    const empty = document.createElement('div');
    empty.className = 'empty'; empty.textContent = 'No motions match those filters.'; empty.style.display = 'none';
    grid.appendChild(empty);

    /* scale each 1280×720 cover down to its thumb width — full-page thumbnail, no crop */
    function fitCovers(){
      document.querySelectorAll('.thumb').forEach(t => {
        const cov = t.querySelector('iframe.cover');
        if (!cov) return;
        const w = t.clientWidth;
        if (w) cov.style.transform = `scale(${w / 1280})`;
      });
    }
    requestAnimationFrame(fitCovers);
    window.addEventListener('resize', fitCovers);

    /* ── build filter pills + dropdowns ── */
    const bar = document.getElementById('filterbar');
    const reset = document.getElementById('reset');
    FILTERS.forEach(f => {
      const g = document.createElement('div');
      g.className = 'fgroup';
      const opts = f.opts.map(([val,txt]) => {
        const n = countFor(f.key, val);
        return `<label class="opt${n ? '' : ' is-zero'}">
          <input type="checkbox" value="${val}"><span class="txt">${txt}</span><span class="n">${n}</span>
        </label>`;
      }).join('');
      g.innerHTML = `
        <button class="pill" type="button">${f.label}<span class="badge"></span><span class="chev"></span></button>
        <div class="dropdown" data-key="${f.key}">${opts}</div>`;
      bar.insertBefore(g, reset);

      const pill = g.querySelector('.pill');
      pill.addEventListener('click', e => {
        e.stopPropagation();
        const wasOpen = g.classList.contains('open');
        document.querySelectorAll('.fgroup.open').forEach(x => x.classList.remove('open'));
        if (!wasOpen) g.classList.add('open');
      });
      g.querySelectorAll('input').forEach(inp => {
        inp.addEventListener('change', () => {
          inp.checked ? sel[f.key].add(inp.value) : sel[f.key].delete(inp.value);
          const badge = pill.querySelector('.badge');
          pill.classList.toggle('is-active', sel[f.key].size > 0);
          badge.textContent = sel[f.key].size || '';
          apply();
        });
      });
      g.querySelector('.dropdown').addEventListener('click', e => e.stopPropagation());
    });

    document.addEventListener('click', () => document.querySelectorAll('.fgroup.open').forEach(x => x.classList.remove('open')));
    const clearBtn = document.getElementById('clearBtn');
    function clearAll(){
      FILTERS.forEach(f => sel[f.key].clear());
      document.querySelectorAll('.filterbar input').forEach(i => i.checked = false);
      document.querySelectorAll('.pill').forEach(p => { p.classList.remove('is-active'); p.querySelector('.badge').textContent = ''; });
      apply();
    }
    reset.addEventListener('click', clearAll);
    clearBtn.addEventListener('click', clearAll);

    /* ── apply filters ── */
    const resultCount = document.getElementById('resultCount');
    function apply(){
      let shown = 0;
      const active = FILTERS.some(f => sel[f.key].size > 0);
      cards.forEach(({el, d}) => {
        const ok = FILTERS.every(f => sel[f.key].size === 0 || sel[f.key].has(d[f.key] || ''));
        el.style.display = ok ? '' : 'none';
        if (ok) shown++;
      });
      empty.style.display = shown ? 'none' : '';
      resultCount.textContent = shown === PROMOS.length ? `${PROMOS.length} motions` : `${shown} of ${PROMOS.length} motions`;
      clearBtn.classList.toggle('show', active);
      requestAnimationFrame(fitCovers);
    }
    apply();

    /* nav hairline on scroll */
    const nav = document.getElementById('nav');
    const onScroll = () => nav.classList.toggle('is-stuck', window.scrollY > 8);
    onScroll(); window.addEventListener('scroll', onScroll, { passive:true });
  </script>
</body>
</html>
